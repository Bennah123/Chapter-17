<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080806;
      --gold: #C9A84C;
      --gold-bright: #FFD700;
      --gold-border: rgba(201,168,76,0.25);
      --gold-dim: rgba(201,168,76,0.08);
      --white: #f5f0e8;
      --muted: rgba(245,240,232,0.45);
      --card-bg: rgba(15,15,12,0.9);
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 100;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      background: rgba(8,8,6,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--gold-border);
    }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }

    /* ── HERO ── */
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }

    /* ── CONTENT ── */
    .content { max-width: 1100px; margin: 0 auto; padding: 0 48px 100px; }

    /* ── ADD EVENT PANEL ── */
    .add-panel {
      background: var(--card-bg); border: 1px solid var(--gold-border);
      border-radius: 4px; padding: 36px; margin-bottom: 60px;
      opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards;
    }
    .panel-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }

    input[type="text"], input[type="date"], input[type="time"], textarea, select {
      background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border);
      border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif;
      font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px;
      outline: none; transition: all 0.3s ease; width: 100%;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
    input::placeholder, textarea::placeholder { color: var(--muted); font-size: 0.75rem; }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #0f0f0c; }

    /* Emoji vibe row */
    .emoji-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .emoji-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); }
    .emoji-btn { background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 3px; padding: 8px 12px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
    .emoji-btn:hover, .emoji-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.15); transform: scale(1.1); }

    .btn-add {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      border: none; border-radius: 3px; color: #080806;
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 5px; padding: 14px 40px; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 0 24px rgba(201,168,76,0.2);
      position: relative; overflow: hidden;
    }
    .btn-add::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-add:hover::before { opacity: 1; }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(255,215,0,0.3); }
    .btn-add span { position: relative; z-index: 1; }

    /* ── FILTER TABS ── */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
    .filter-btn {
      background: transparent; border: 1px solid var(--gold-border);
      border-radius: 2px; color: var(--muted); font-family: 'Raleway', sans-serif;
      font-size: 0.7rem; letter-spacing: 2px; padding: 8px 20px; cursor: pointer; transition: all 0.3s;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .section-header h3 { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); white-space: nowrap; }
    .section-header .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }

    /* ── EVENTS GRID ── */
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 60px; }

    /* ── EVENT CARD ── */
    .event-card {
      background: var(--card-bg); border: 1px solid var(--gold-border);
      border-radius: 4px; overflow: hidden; position: relative;
      transition: all 0.4s ease;
      opacity: 0; transform: translateY(20px);
    }
    .event-card.visible { opacity: 1; transform: translateY(0); }
    .event-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(201,168,76,0.12); }
    .event-card.past { opacity: 0.55; }
    .event-card.past:hover { opacity: 0.8; }

    /* Top color bar */
    .event-bar { height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .event-bar.past-bar { background: linear-gradient(90deg, transparent, var(--muted), transparent); }

    .event-body { padding: 24px; }

    .event-emoji { font-size: 1.8rem; display: block; margin-bottom: 12px; }

    /* Countdown badge */
    .event-countdown {
      position: absolute; top: 16px; right: 16px;
      font-family: 'Cinzel', serif; font-size: 0.55rem;
      letter-spacing: 2px; color: var(--bg);
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      padding: 4px 10px; border-radius: 2px;
    }
    .event-countdown.past-badge { background: var(--muted); color: var(--bg); }

    .event-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.2rem; color: var(--white); margin-bottom: 6px; }
    .event-date { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px; }
    .event-location { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; margin-bottom: 10px; }
    .event-desc { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }

    /* RSVP section */
    .rsvp-section { border-top: 1px solid var(--gold-border); padding-top: 14px; }
    .rsvp-title { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 10px; }

    .rsvp-names { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 24px; }
    .rsvp-name { font-size: 0.65rem; letter-spacing: 1px; color: var(--bg); background: var(--gold); padding: 3px 10px; border-radius: 2px; font-family: 'Raleway', sans-serif; }

    .rsvp-input-row { display: flex; gap: 8px; }
    .rsvp-input {
      flex: 1; background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border);
      border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif;
      font-size: 0.75rem; letter-spacing: 1px; padding: 8px 12px; outline: none; transition: all 0.3s;
    }
    .rsvp-input:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .rsvp-input::placeholder { color: var(--muted); }

    .rsvp-btn {
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      border-radius: 3px; color: var(--gold);
      font-family: 'Cinzel', serif; font-size: 0.55rem;
      letter-spacing: 2px; padding: 8px 14px; cursor: pointer; transition: all 0.3s; white-space: nowrap;
    }
    .rsvp-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.15); }

    .event-delete { position: absolute; bottom: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; transition: color 0.3s; letter-spacing: 1px; font-family: 'Raleway', sans-serif; opacity: 0; transition: all 0.3s; }
    .event-card:hover .event-delete { opacity: 1; color: var(--gold); }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .hero { padding: 120px 24px 40px; }
      .content { padding: 0 24px 80px; }
      .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>

<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I &nbsp;·&nbsp; Events</span>
  <h1 class="page-title">Events</h1>
  <p class="page-sub">"Upcoming hangouts, who's pulling up."</p>
</section>

<div class="content">

  <!-- ADD EVENT -->
  <div class="add-panel">
    <p class="panel-title">Plan a Hangout</p>

    <div class="form-grid">
      <div class="input-group">
        <label>Event Name</label>
        <input type="text" id="eventTitle" placeholder="e.g. Beach Day"/>
      </div>
      <div class="input-group">
        <label>Category</label>
        <select id="eventCategory">
          <option value="Hangout">Hangout</option>
          <option value="Trip">Trip</option>
          <option value="Celebration">Celebration</option>
          <option value="Game Night">Game Night</option>
          <option value="Food Run">Food Run</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="form-grid-3">
      <div class="input-group">
        <label>Date</label>
        <input type="date" id="eventDate"/>
      </div>
      <div class="input-group">
        <label>Time</label>
        <input type="time" id="eventTime"/>
      </div>
      <div class="input-group">
        <label>Location</label>
        <input type="text" id="eventLocation" placeholder="e.g. Nairobi CBD"/>
      </div>
    </div>

    <div class="input-group" style="margin-bottom:16px">
      <label>Details</label>
      <textarea id="eventDesc" placeholder="What's the plan?"></textarea>
    </div>

    <div class="emoji-row">
      <span class="emoji-label">Vibe</span>
      <button class="emoji-btn selected" data-emoji="🔥">🔥</button>
      <button class="emoji-btn" data-emoji="🏖️">🏖️</button>
      <button class="emoji-btn" data-emoji="🎉">🎉</button>
      <button class="emoji-btn" data-emoji="🍔">🍔</button>
      <button class="emoji-btn" data-emoji="🎮">🎮</button>
      <button class="emoji-btn" data-emoji="🌍">🌍</button>
      <button class="emoji-btn" data-emoji="🎵">🎵</button>
      <button class="emoji-btn" data-emoji="🏆">🏆</button>
    </div>

    <button class="btn-add" onclick="addEvent()"><span>Add to Events</span></button>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('upcoming', this)">Upcoming</button>
    <button class="filter-btn" onclick="setFilter('past', this)">Past</button>
  </div>

  <!-- UPCOMING -->
  <div id="upcomingSection">
    <div class="section-header">
      <h3>Upcoming</h3>
      <div class="rule"></div>
    </div>
    <div class="events-grid" id="upcomingGrid">
      <div class="empty-state"><span class="empty-icon">📅</span><p>No upcoming events yet.</p></div>
    </div>
  </div>

  <!-- PAST -->
  <div id="pastSection">
    <div class="section-header">
      <h3>Past Hangouts</h3>
      <div class="rule"></div>
    </div>
    <div class="events-grid" id="pastGrid">
      <div class="empty-state"><span class="empty-icon">📖</span><p>No past events yet.</p></div>
    </div>
  </div>

</div>
<script>
  // =========================
  // SUPABASE CONNECTION
  // =========================
  const SUPABASE_URL = "https://whgxunnlxhcfthkpcbjd.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE";

  let supabase;
  window.addEventListener("Load", () => {
    supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );
    renderEvents();
  });

  let selectedEmoji = '🔥';
  let activeFilter = 'all';

  // =========================
  // EMOJI PICKER
  // =========================
  document.querySelectorAll('.emoji-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedEmoji = btn.dataset.emoji;
    });
  });

  // =========================
  // ADD EVENT (SUPABASE)
  // =========================
  window.addEvent = async function () {
  if (!supabase) return;
  alert("clicked 😭🔥");
  const title = document.getElementById('eventTitle').value.trim();
  const category = document.getElementById('eventCategory').value;
  const date = document.getElementById('eventDate').value;
  const time = document.getElementById('eventTime').value;
  const location = document.getElementById('eventLocation').value.trim();
  const desc = document.getElementById('eventDesc').value.trim();

  console.log({ title, category, date, time, location, desc });

  const { data, error } = await supabase
  .from('events')
  .insert([{
    title: "TEST EVENT",
    category: "Test",
    date: "2026-01-01",
    time: "12:00",
    location: "Test",
    desc: "Testing",
    emoji: "🔥"
  }])
  .select();

console.log("DATA:", data);
console.log("ERROR:", error);
    renderEvents();
  };
  // =========================
  // RSVP (LOCAL UPDATE FOR NOW)
  // =========================
  async function rsvp(id) {
    const input = document.getElementById(`rsvp-${id}`);
    const name  = input.value.trim();
    if (!name) return;

    const { data: events } = await supabase
      .from('events')
      .select('*');

    const event = events.find(e => e.id === id);
    if (!event) return;

    let rsvps = event.rsvps || [];

    if (rsvps.includes(name)) {
      input.value = '';
      return alert(`${name} already RSVPed!`);
    }

    rsvps.push(name);

    await supabase
      .from('events')
      .update({ rsvps })
      .eq('id', id);

    renderEvents();
  }

  // =========================
  // DELETE EVENT
  // =========================
  async function deleteEvent(id) {
    if (!confirm('Remove this event?')) return;

    await supabase
      .from('events')
      .delete()
      .eq('id', id);

    renderEvents();
  }

  // =========================
  // FILTER (UNCHANGED)
  // =========================
  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const up   = document.getElementById('upcomingSection');
    const past = document.getElementById('pastSection');

    if (filter === 'upcoming') {
      up.style.display = '';
      past.style.display = 'none';
    } else if (filter === 'past') {
      up.style.display = 'none';
      past.style.display = '';
    } else {
      up.style.display = '';
      past.style.display = '';
    }
  }

  // =========================
  // COUNTDOWN (UNCHANGED)
  // =========================
  function getCountdown(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const event = new Date(dateStr);
    const diff  = Math.round((event - today) / 86400000);

    if (diff < 0)  return { label: 'Past', past: true };
    if (diff === 0) return { label: 'Today! 🔥', past: false };
    if (diff === 1) return { label: 'Tomorrow', past: false };
    return { label: `${diff} days`, past: false };
  }

  // =========================
  // BUILD CARD (UNCHANGED)
  // =========================
  function buildCard(ev) {
    const countdown = getCountdown(ev.date);

    const formattedDate = new Date(ev.date).toLocaleDateString('en-GB', {
      weekday:'long',
      day:'numeric',
      month:'long',
      year:'numeric'
    });

    const timeStr = ev.time ? ` · ${ev.time}` : '';
    const rsvpNames = (ev.rsvps || []).map(n =>
      `<span class="rsvp-name">${n}</span>`
    ).join('');

    const card = document.createElement('div');
    card.className = `event-card${countdown.past ? ' past' : ''}`;

    card.innerHTML = `
      <div class="event-bar${countdown.past ? ' past-bar' : ''}"></div>
      <span class="event-countdown${countdown.past ? ' past-badge' : ''}">
        ${countdown.label}
      </span>

      <div class="event-body">
        <span class="event-emoji">${ev.emoji}</span>
        <p class="event-title">${ev.title}</p>
        <p class="event-date">${formattedDate}${timeStr}</p>
        <p class="event-location">📍 ${ev.location} · ${ev.category}</p>
        <p class="event-desc">${ev.desc}</p>

        <div class="rsvp-section">
          <p class="rsvp-title">Who's Pulling Up — ${(ev.rsvps || []).length}</p>
          <div class="rsvp-names">${rsvpNames}</div>

          ${!countdown.past ? `
            <div class="rsvp-input-row">
              <input class="rsvp-input"
                id="rsvp-${ev.id}"
                placeholder="Your name..."
                onkeydown="if(event.key==='Enter') rsvp(${ev.id})"
              />
              <button class="rsvp-btn" onclick="rsvp(${ev.id})">
                I'm In
              </button>
            </div>
          ` : ''}
        </div>
      </div>

      <button class="event-delete" onclick="deleteEvent(${ev.id})">
        ✕ remove
      </button>
    `;

    return card;
  }

  // =========================
  // LOAD EVENTS FROM SUPABASE
  // =========================
  async function renderEvents() {
    if (!supabase) return;
    const { data: events, error } = await supabase
      .from('events')
      .select('*')
      .order('date', { ascending: true });

    if (error) {
      console.log(error);
      return;
    }

    const today = new Date();
    today.setHours(0,0,0,0);

    const upcoming = events.filter(e => new Date(e.date) >= today);
    const past     = events.filter(e => new Date(e.date) < today);

    const upGrid   = document.getElementById('upcomingGrid');
    const pastGrid = document.getElementById('pastGrid');

    upGrid.innerHTML = '';
    pastGrid.innerHTML = '';

    if (upcoming.length === 0) {
      upGrid.innerHTML = '<div class="empty-state">No upcoming events 🔥</div>';
    } else {
      upcoming.forEach(ev => upGrid.appendChild(buildCard(ev)));
    }

    if (past.length === 0) {
      pastGrid.innerHTML = '<div class="empty-state">No past events 📖</div>';
    } else {
      past.slice().reverse().forEach(ev => pastGrid.appendChild(buildCard(ev)));
    }

    // animations
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.event-card')
      .forEach(c => observer.observe(c));
  }

  // =========================
  // INIT
  // =========================
  document.getElementById('eventDate').valueAsDate = new Date();
  renderEvents();
</script>

</body>
</html>
