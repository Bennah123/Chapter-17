<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Polls</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080806; --gold: #C9A84C; --gold-bright: #FFD700; --gold-border: rgba(201,168,76,0.25); --gold-dim: rgba(201,168,76,0.08); --white: #f5f0e8; --muted: rgba(245,240,232,0.45); --card-bg: rgba(15,15,12,0.9); }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; background: rgba(8,8,6,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .content { max-width: 900px; margin: 0 auto; padding: 0 48px 100px; }
    .add-panel { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 36px; margin-bottom: 60px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
    .panel-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-group label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }
    input[type="text"] { background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px; outline: none; transition: all 0.3s ease; width: 100%; }
    input:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
    input::placeholder { color: var(--muted); font-size: 0.75rem; }
    .options-builder { margin-bottom: 20px; }
    .options-builder label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; display: block; margin-bottom: 10px; }
    .option-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .option-row input { flex: 1; }
    .option-remove { background: none; border: 1px solid var(--gold-border); border-radius: 3px; color: var(--muted); width: 36px; height: 42px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; flex-shrink: 0; }
    .option-remove:hover { border-color: var(--gold); color: var(--gold); }
    .btn-add-option { background: var(--gold-dim); border: 1px dashed var(--gold-border); border-radius: 3px; color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; padding: 10px 20px; cursor: pointer; transition: all 0.3s; width: 100%; margin-bottom: 20px; }
    .btn-add-option:hover { border-color: var(--gold); background: rgba(201,168,76,0.12); }
    .btn-create { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; padding: 14px 40px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 24px rgba(201,168,76,0.2); position: relative; overflow: hidden; }
    .btn-create::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-create:hover::before { opacity: 1; }
    .btn-create:hover { transform: translateY(-1px); }
    .btn-create span { position: relative; z-index: 1; }
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .section-header h3 { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); white-space: nowrap; }
    .section-header .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }
    .poll-card { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 32px; margin-bottom: 24px; position: relative; transition: all 0.4s ease; opacity: 0; transform: translateY(20px); }
    .poll-card.visible { opacity: 1; transform: translateY(0); }
    .poll-card:hover { border-color: rgba(201,168,76,0.4); }
    .poll-question { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.3rem; color: var(--white); margin-bottom: 6px; }
    .poll-meta { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 3px; color: var(--gold); margin-bottom: 20px; }
    .poll-voter-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .poll-voter-input { flex: 1; background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.78rem; letter-spacing: 1px; padding: 10px 14px; outline: none; transition: all 0.3s; }
    .poll-voter-input:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .poll-voter-input::placeholder { color: var(--muted); }
    .poll-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .poll-option { background: rgba(201,168,76,0.04); border: 1px solid var(--gold-border); border-radius: 3px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; position: relative; }
    .poll-option:hover { border-color: var(--gold); }
    .poll-option.winner { border-color: var(--gold-bright); box-shadow: 0 0 16px rgba(255,215,0,0.15); }
    .option-bar { position: absolute; inset: 0; left: 0; background: linear-gradient(90deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05)); transition: width 0.6s ease; pointer-events: none; }
    .option-content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
    .option-text { font-family: 'Raleway', sans-serif; font-size: 0.85rem; letter-spacing: 1px; color: var(--white); }
    .option-right { display: flex; align-items: center; gap: 12px; }
    .option-pct { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1rem; color: var(--gold); }
    .option-count { font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; }
    .voters-names { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 18px 10px; }
    .voter-tag { font-size: 0.6rem; letter-spacing: 1px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 2px; padding: 3px 10px; color: var(--muted); }
    .poll-total { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 3px; color: var(--muted); margin-top: 14px; }
    .poll-delete { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; opacity: 0; transition: all 0.3s; letter-spacing: 1px; font-family: 'Raleway', sans-serif; }
    .poll-card:hover .poll-delete { opacity: 1; color: var(--gold); }
    .loading { text-align: center; padding: 60px 24px; }
    .loading-spinner { width: 40px; height: 40px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 3px; padding: 12px 28px; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { nav { padding: 0 24px; } .hero { padding: 120px 24px 40px; } .content { padding: 0 24px 80px; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>
<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I · Polls</span>
  <h1 class="page-title">Polls</h1>
  <p class="page-sub">"The squad decides together."</p>
</section>
<div class="content">
  <div class="add-panel">
    <p class="panel-title">Create a Poll</p>
    <div class="input-group"><label>Question</label><input type="text" id="pollQuestion" placeholder="e.g. Where should we hang next?"/></div>
    <div class="input-group"><label>Your Name</label><input type="text" id="pollCreator" placeholder="Who's asking?"/></div>
    <div class="options-builder">
      <label>Options</label>
      <div id="optionsList">
        <div class="option-row"><input type="text" placeholder="Option 1" class="poll-opt-input"/><button class="option-remove" onclick="removeOption(this)">✕</button></div>
        <div class="option-row"><input type="text" placeholder="Option 2" class="poll-opt-input"/><button class="option-remove" onclick="removeOption(this)">✕</button></div>
      </div>
      <button class="btn-add-option" onclick="addOption()">+ Add Option</button>
    </div>
    <button class="btn-create" onclick="createPoll()"><span>Create Poll</span></button>
  </div>
  <div class="section-header"><h3>Active Polls</h3><div class="rule"></div></div>
  <div id="pollsList">
    <div class="loading"><div class="loading-spinner"></div><p>Loading polls...</p></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://whgxunnlxhcfthkpcbjd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE'
  );

  let optionCount = 2;

  function addOption() {
    optionCount++;
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `<input type="text" placeholder="Option ${optionCount}" class="poll-opt-input"/><button class="option-remove" onclick="removeOption(this)">✕</button>`;
    document.getElementById('optionsList').appendChild(row);
  }

  function removeOption(btn) {
    if (document.querySelectorAll('.option-row').length <= 2) return alert('Need at least 2 options!');
    btn.parentElement.remove();
  }

  async function createPoll() {
    const question = document.getElementById('pollQuestion').value.trim();
    const creator  = document.getElementById('pollCreator').value.trim();
    const optInputs = document.querySelectorAll('.poll-opt-input');
    const options  = [...optInputs].map(i => i.value.trim()).filter(Boolean);
    if (!question) return alert('Enter a question!');
    if (!creator)  return alert('Enter your name!');
    if (options.length < 2) return alert('Add at least 2 options!');

    const date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    await sb.from('polls').insert({
      question, creator, date,
      options: options.map(text => ({ text, votes: [], voters: [] })),
      voters: []
    });

    showToast('Poll created!! 🗳️');
    document.getElementById('pollQuestion').value = '';
    document.getElementById('pollCreator').value = '';
    document.querySelectorAll('.poll-opt-input').forEach((input, i) => { input.value = ''; input.placeholder = `Option ${i + 1}`; });
    loadPolls();
  }

  async function vote(pollId, optionIndex, voterName) {
    if (!voterName) return alert('Enter your name to vote!');
    const { data } = await sb.from('polls').select('*').eq('id', pollId).single();
    if (!data) return;
    if ((data.voters || []).includes(voterName)) return alert(`${voterName} already voted!`);
    const options = [...data.options];
    options[optionIndex].votes.push(voterName);
    options[optionIndex].voters.push(voterName);
    const voters = [...(data.voters || []), voterName];
    await sb.from('polls').update({ options, voters }).eq('id', pollId);
    showToast('Vote cast!! 🔥');
    loadPolls();
  }

  async function deletePoll(id) {
    if (!confirm('Delete this poll?')) return;
    await sb.from('polls').delete().eq('id', id);
    showToast('Poll deleted.');
    loadPolls();
  }

  async function loadPolls() {
    const { data, error } = await sb.from('polls').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    renderPolls(data || []);
  }

  function renderPolls(polls) {
    const list = document.getElementById('pollsList');
    if (polls.length === 0) {
      list.innerHTML = '<div class="empty-state"><span class="empty-icon">🗳️</span><p>No polls yet. Start one!</p></div>';
      return;
    }
    list.innerHTML = '';
    polls.forEach((poll, pi) => {
      const totalVotes = (poll.voters || []).length;
      const maxVotes   = Math.max(...poll.options.map(o => (o.votes || []).length));
      const optionsHTML = poll.options.map((opt, oi) => {
        const count   = (opt.votes || []).length;
        const pct     = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0;
        const isWinner = count === maxVotes && count > 0;
        const votersHTML = (opt.voters || []).length ? (opt.voters || []).map(v => `<span class="voter-tag">${v}</span>`).join('') : '';
        return `
          <div class="poll-option${isWinner ? ' winner' : ''}" onclick="handleOptionClick(${poll.id}, ${oi}, this)">
            <div class="option-bar" style="width:${pct}%"></div>
            <div class="option-content">
              <span class="option-text">${opt.text}</span>
              <span class="option-right">
                ${isWinner && totalVotes > 0 ? '<span>👑</span>' : ''}
                <span class="option-pct">${pct}%</span>
                <span class="option-count">${count} vote${count !== 1 ? 's' : ''}</span>
              </span>
            </div>
            ${votersHTML ? `<div class="voters-names">${votersHTML}</div>` : ''}
          </div>
        `;
      }).join('');
      const card = document.createElement('div');
      card.className = 'poll-card';
      card.style.transitionDelay = `${pi * 0.07}s`;
      card.innerHTML = `
        <button class="poll-delete" onclick="deletePoll(${poll.id})">✕ delete</button>
        <p class="poll-question">${poll.question}</p>
        <p class="poll-meta">By ${poll.creator} · ${poll.date} · ${totalVotes} vote${totalVotes !== 1 ? 's' : ''}</p>
        <div class="poll-voter-row">
          <input class="poll-voter-input" id="voter-${poll.id}" placeholder="Your name to vote..."/>
        </div>
        <div class="poll-options">${optionsHTML}</div>
        <p class="poll-total">${totalVotes} total vote${totalVotes !== 1 ? 's' : ''} · ${(poll.voters || []).length > 0 ? poll.voters.join(', ') : 'No votes yet'}</p>
      `;
      list.appendChild(card);
    });
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.poll-card').forEach(c => observer.observe(c));
  }

  function handleOptionClick(pollId, optionIndex, el) {
    const voterInput = document.getElementById(`voter-${pollId}`);
    const name = voterInput ? voterInput.value.trim() : '';
    vote(pollId, optionIndex, name);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  sb.channel('polls').on('postgres_changes', { event: '*', schema: 'public', table: 'polls' }, () => loadPolls()).subscribe();
  loadPolls();
</script>
</body>
</html>
