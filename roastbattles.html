<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Roast Battle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080806;
      --bg2: #0f0f0c;
      --gold: #C9A84C;
      --gold-bright: #FFD700;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-border: rgba(201,168,76,0.25);
      --white: #f5f0e8;
      --muted: rgba(245,240,232,0.45);
      --red: #c94c4c;
      --green: #4cc96e;
      --fire: #ff6b35;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      background: rgba(8,8,6,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--gold-border);
    }

    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 5px;
      color: var(--gold);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .nav-links a:hover { color: var(--gold); }

    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .nav-burger span {
      display: block;
      width: 24px; height: 1px;
      background: var(--gold);
    }

    /* ── HERO ── */
    .hero {
      min-height: 50dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 60%);
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
    }

    .hero-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 10px;
      color: var(--fire);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 8px;
      color: var(--gold);
      text-shadow: 0 0 60px rgba(201,168,76,0.4);
      margin-bottom: 16px;
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--muted);
      letter-spacing: 2px;
      max-width: 500px;
    }

    /* ── START BUTTON ── */
    .start-btn {
      margin-top: 32px;
      padding: 16px 48px;
      background: var(--fire);
      color: var(--bg);
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(255,107,53,0.3);
    }

    .start-btn:hover {
      background: #ff8555;
      box-shadow: 0 0 40px rgba(255,107,53,0.5);
      transform: translateY(-2px);
    }

    .start-btn.hidden { display: none; }

    /* ── GAME AREA ── */
    .game-area {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 80px;
      position: relative;
      z-index: 10;
    }

    /* ── TARGET SELECT ── */
    .target-section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .section-header h3 {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .section-header .rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gold-border), transparent);
    }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .target-card {
      background: var(--bg2);
      border: 1px solid var(--gold-border);
      border-radius: 4px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .target-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,107,53,0.05), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .target-card:hover::before { opacity: 1; }

    .target-card:hover {
      border-color: var(--fire);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,107,53,0.1);
    }

    .target-card.selected {
      border-color: var(--fire);
      background: rgba(255,107,53,0.05);
    }

    .target-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 2px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: var(--gold);
      margin: 0 auto 12px;
      transition: all 0.3s ease;
    }

    .target-card:hover .target-avatar {
      border-color: var(--fire);
      box-shadow: 0 0 20px rgba(255,107,53,0.2);
    }

    .target-card.selected .target-avatar {
      border-color: var(--fire);
      background: rgba(255,107,53,0.1);
    }

    .target-name {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .target-roasts {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── ROAST INPUT ── */
    .roast-section {
      margin-bottom: 40px;
      display: none;
    }

    .roast-section.active { display: block; }

    .roast-input-area {
      background: var(--bg2);
      border: 1px solid var(--gold-border);
      border-radius: 4px;
      padding: 24px;
      position: relative;
    }

    .roast-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--fire);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }

    .roast-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--gold-border);
      color: var(--white);
      padding: 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      line-height: 1.6;
      border-radius: 4px;
      outline: none;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.3s ease;
    }

    .roast-textarea:focus {
      border-color: var(--fire);
      box-shadow: 0 0 15px rgba(255,107,53,0.1);
    }

    .roast-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .roast-counter {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .roast-submit {
      background: var(--fire);
      color: var(--bg);
      border: none;
      padding: 12px 32px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .roast-submit:hover {
      background: #ff8555;
      box-shadow: 0 0 20px rgba(255,107,53,0.3);
    }

    .roast-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── ROASTS FEED ── */
    .roasts-feed {
      margin-bottom: 40px;
    }

    .roast-card {
      background: var(--bg2);
      border: 1px solid var(--gold-border);
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .roast-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--fire);
      opacity: 0.6;
    }

    .roast-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .roast-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .roast-author-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      color: var(--gold);
    }

    .roast-author-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--gold);
    }

    .roast-time {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .roast-target {
      font-size: 0.7rem;
      color: var(--fire);
      margin-bottom: 8px;
      font-style: italic;
    }

    .roast-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--white);
      margin-bottom: 16px;
    }

    .roast-votes {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .vote-btn {
      background: none;
      border: 1px solid var(--gold-border);
      color: var(--muted);
      padding: 6px 16px;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .vote-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .vote-btn.voted {
      border-color: var(--fire);
      color: var(--fire);
      background: rgba(255,107,53,0.1);
    }

    .vote-count {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
    }

    /* ── LEADERBOARD ── */
    .leaderboard {
      background: var(--bg2);
      border: 1px solid var(--gold-border);
      border-radius: 4px;
      padding: 32px;
      margin-bottom: 40px;
    }

    .leaderboard h3 {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 24px;
      text-align: center;
    }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--gold-border);
    }

    .leaderboard-row:last-child { border-bottom: none; }

    .leaderboard-rank {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      width: 40px;
    }

    .leaderboard-name {
      flex: 1;
      font-size: 0.85rem;
      color: var(--white);
    }

    .leaderboard-score {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: var(--fire);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--gold-border);
      padding: 32px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    footer .logo {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 5px;
      color: var(--gold);
    }

    footer p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      .nav-burger { display: flex; }
      .hero { min-height: 40dvh; padding-top: 80px; }
      .game-area { padding: 0 24px 60px; }
      footer { padding: 28px 24px; justify-content: center; }
      .target-grid { grid-template-columns: repeat(2, 1fr); }
      .roast-actions { flex-direction: column; gap: 12px; }
    }
  </style>
</head>

<!-- NAVBAR -->
<nav>
  <a class="nav-logo" href="dashboard.html">← Chapter 17</a>
  <ul class="nav-links">
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="scoreboard.html">Scoreboard</a></li>
  </ul>
  <button class="nav-burger" id="burger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-glow"></div>
  <p class="hero-tag">Hakuna Kulia😭</p>
  <h1 class="hero-title">ROAST BATTLE</h1>
  <p class="hero-sub">"Pick a target. Drop a roast. Let the squad vote. The sharpest tongue wins."</p>
  <button class="start-btn" id="startBtn">ENTER THE ARENA</button>
</section>

<!-- GAME AREA -->
<div class="game-area" id="gameArea">

  <!-- TARGET SELECT -->
  <div class="target-section" id="targetSection" style="display:none;">
    <div class="section-header">
      <h3>Pick Your Target</h3>
      <div class="rule"></div>
    </div>
    <div class="target-grid" id="targetGrid">
      <!-- Targets injected by JS -->
    </div>
  </div>

  <!-- ROAST INPUT -->
  <div class="roast-section" id="roastSection">
    <div class="roast-input-area">
      <span class="roast-label" id="roastLabel">Roasting: <span id="targetName">Select a target</span></span>
      <textarea class="roast-textarea" id="roastInput" placeholder="Drop your roast here... keep it clever, not cruel. 😏" maxlength="280"></textarea>
      <div class="roast-actions">
        <span class="roast-counter" id="roastCounter">0 / 280</span>
        <button class="roast-submit" id="roastSubmit" disabled>FIRE ROAST 🔥</button>
      </div>
    </div>
  </div>

  <!-- ROASTS FEED -->
  <div class="roasts-feed" id="roastsFeed">
    <div class="section-header">
      <h3>Latest Burns</h3>
      <div class="rule"></div>
    </div>
    <div id="roastsList">
      <!-- Roasts injected by JS -->
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="leaderboard" id="leaderboard">
    <h3>🔥 Roast Kings & Queens</h3>
    <div id="leaderboardList">
      <!-- Leaderboard injected by JS -->
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <span class="logo">Chapter 17</span>
  <p>"The best roasts come from love... mostly."</p>
</footer>

<script>
// ── SUPABASE SETUP ──
const SUPABASE_URL = 'https://whgxunnlxhcfthkpcbjd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE';

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ──
let currentUser = sessionStorage.getItem('c17_name') || localStorage.getItem('c17_name') || 'Agent';
let selectedTarget = null;
let gameStarted = false;

const members = [
  { name: 'Macharia', initials: 'M', roasts: 0 },
  { name: 'Mrs Edwardo', initials: 'E', roasts: 0 },
  { name: 'Mustapha', initials: 'M', roasts: 0 },
  { name: 'Ghost Manny', initials: 'M', roasts: 0 },
  { name: 'Mrs Manny', initials: 'M', roasts: 0 },
  { name: 'Master Ben', initials: 'G', roasts: 0 },
  { name: 'Mrs Ben', initials: 'S', roasts: 0 },
  { name: 'Cipher Kinoti', initials: 'K', roasts: 0 },
  { name: 'Mrs Kinoti', initials: 'K', roasts: 0 },
  { name: 'Thee Ori', initials: 'O', roasts: 0 },
  { name: 'Mrs Ori', initials: 'O', roasts: 0 }
];

// ── INIT ──
function init() {
  renderTargets();
  setupStartButton();
  setupRoastInput();
  loadRoasts();
  setupRealtime();
  loadLeaderboard();
}

function setupStartButton() {
  const btn = document.getElementById('startBtn');
  btn.addEventListener('click', () => {
    gameStarted = true;
    btn.classList.add('hidden');
    document.getElementById('targetSection').style.display = 'block';
    document.getElementById('roastSection').classList.add('active');
  });
}

// ── RENDER TARGETS ──
function renderTargets() {
  const grid = document.getElementById('targetGrid');
  grid.innerHTML = members.map(m => `
    <div class="target-card" data-name="${m.name}" onclick="selectTarget('${m.name}')">
      <div class="target-avatar">${m.initials}</div>
      <div class="target-name">${m.name}</div>
      <div class="target-roasts">${m.roasts} roasts taken</div>
    </div>
  `).join('');
}

function selectTarget(name) {
  selectedTarget = name;
  document.querySelectorAll('.target-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-name="${name}"]`).classList.add('selected');
  document.getElementById('targetName').textContent = name;
  document.getElementById('roastLabel').innerHTML = `Roasting: <span style="color:var(--fire)">${name}</span>`;
  checkSubmitReady();
}

// ── ROAST INPUT ──
function setupRoastInput() {
  const textarea = document.getElementById('roastInput');
  const counter = document.getElementById('roastCounter');
  const submit = document.getElementById('roastSubmit');

  textarea.addEventListener('input', () => {
    const len = textarea.value.length;
    counter.textContent = `${len} / 280`;
    counter.style.color = len > 250 ? 'var(--red)' : 'var(--muted)';
    checkSubmitReady();
  });

  submit.addEventListener('click', submitRoast);
}

function checkSubmitReady() {
  const textarea = document.getElementById('roastInput');
  const submit = document.getElementById('roastSubmit');
  const ready = selectedTarget && textarea.value.trim().length > 0 && gameStarted;
  submit.disabled = !ready;
}

async function submitRoast() {
  const textarea = document.getElementById('roastInput');
  const text = textarea.value.trim();
  if (!text || !selectedTarget) return;

  const roast = {
    author: currentUser,
    target: selectedTarget,
    text: text,
    votes: 0,
    voted_by: [],
    created_at: new Date().toISOString()
  };

  try {
    await supabaseClient.from('roasts').insert(roast);
    textarea.value = '';
    document.getElementById('roastCounter').textContent = '0 / 280';
    checkSubmitReady();
  } catch (e) {
    console.log('Roast sync failed:', e);
    // Add locally for offline
    addRoastToFeed({...roast, id: Date.now()});
  }
}

// ── RENDER ROASTS ──
function addRoastToFeed(roast) {
  const list = document.getElementById('roastsList');
  const div = document.createElement('div');
  div.className = 'roast-card';
  div.dataset.id = roast.id;
  div.innerHTML = `
    <div class="roast-header">
      <div class="roast-author">
        <div class="roast-author-avatar">${roast.author[0]}</div>
        <span class="roast-author-name">${roast.author}</span>
      </div>
      <span class="roast-time">${timeAgo(roast.created_at)}</span>
    </div>
    <div class="roast-target">Roasting ${roast.target}</div>
    <div class="roast-text">"${roast.text}"</div>
    <div class="roast-votes">
      <button class="vote-btn" onclick="voteRoast('${roast.id}', 'fire')">
        🔥 <span class="vote-count" id="fire-${roast.id}">${roast.votes || 0}</span>
      </button>
    </div>
  `;
  list.insertBefore(div, list.firstChild);
}

function timeAgo(date) {
  const seconds = Math.floor((new Date() - new Date(date)) / 1000);
  if (seconds < 60) return 'just now';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours / 24)}d ago`;
}

// ── VOTING ──
async function voteRoast(roastId, type) {
  try {
    const { data } = await supabaseClient
      .from('roasts')
      .select('votes, voted_by')
      .eq('id', roastId)
      .single();

    if (!data) return;
    
    const votedBy = data.voted_by || [];
    if (votedBy.includes(currentUser)) {
      // Already voted
      return;
    }

    await supabaseClient
      .from('roasts')
      .update({
        votes: (data.votes || 0) + 1,
        voted_by: [...votedBy, currentUser]
      })
      .eq('id', roastId);

    // Update UI immediately
    const count = document.getElementById(`fire-${roastId}`);
    if (count) count.textContent = (data.votes || 0) + 1;
    
    const btn = count.closest('.vote-btn');
    if (btn) btn.classList.add('voted');
  } catch (e) {
    console.log('Vote failed:', e);
  }
}

// ── LOAD ROASTS ──
async function loadRoasts() {
  try {
    const { data, error } = await supabaseClient
      .from('roasts')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(20);

    if (error) throw error;
    
    const list = document.getElementById('roastsList');
    list.innerHTML = '';
    data.forEach(roast => addRoastToFeed(roast));
  } catch (e) {
    console.log('Load roasts failed:', e);
  }
}

// ── REALTIME ──
function setupRealtime() {
  try {
    supabaseClient
      .channel('roast_updates')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'roasts' },
        (payload) => {
          const roast = payload.new;
          // Don't duplicate if it's our own roast (already added locally)
          const existing = document.querySelector(`[data-id="${roast.id}"]`);
          if (!existing) {
            addRoastToFeed(roast);
          }
        }
      )
      .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'roasts' },
        (payload) => {
          const roast = payload.new;
          const count = document.getElementById(`fire-${roast.id}`);
          if (count) count.textContent = roast.votes;
        }
      )
      .subscribe((status) => {
        console.log('Roast subscription:', status);
      });
  } catch (e) {
    console.log('Realtime not available:', e);
  }
}

// ── LEADERBOARD ──
async function loadLeaderboard() {
  try {
    const { data, error } = await supabaseClient
      .from('roasts')
      .select('author, votes');

    if (error) throw error;

    // Calculate scores
    const scores = {};
    data.forEach(r => {
      scores[r.author] = (scores[r.author] || 0) + (r.votes || 0);
    });

    const sorted = Object.entries(scores)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5);

    const list = document.getElementById('leaderboardList');
    list.innerHTML = sorted.map((entry, i) => `
      <div class="leaderboard-row">
        <span class="leaderboard-rank">${i + 1}</span>
        <span class="leaderboard-name">${entry[0]}</span>
        <span class="leaderboard-score">${entry[1]} 🔥</span>
      </div>
    `).join('');

    if (sorted.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">No roasts yet. Be the first! 🔥</div>';
    }
  } catch (e) {
    console.log('Leaderboard failed:', e);
  }
}
