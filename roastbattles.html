<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Roast Battle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080806; --gold: #C9A84C; --gold-bright: #FFD700; --gold-border: rgba(201,168,76,0.25); --gold-dim: rgba(201,168,76,0.08); --white: #f5f0e8; --muted: rgba(245,240,232,0.45); --card-bg: rgba(15,15,12,0.9); }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; background: rgba(8,8,6,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .content { max-width: 800px; margin: 0 auto; padding: 0 48px 100px; }
    .add-panel { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 36px; margin-bottom: 60px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
    .panel-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }
    select, textarea { background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px; outline: none; transition: all 0.3s ease; width: 100%; }
    select:focus, textarea:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
    select option { background: #0f0f0c; }
    textarea { resize: vertical; min-height: 100px; }
    textarea::placeholder { color: var(--muted); font-size: 0.75rem; }
    .btn-post { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; padding: 14px 40px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 24px rgba(201,168,76,0.2); position: relative; overflow: hidden; }
    .btn-post::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-post:hover::before { opacity: 1; }
    .btn-post:hover { transform: translateY(-1px); }
    .btn-post span { position: relative; z-index: 1; }
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .section-header h3 { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); white-space: nowrap; }
    .section-header .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }
    .roast-card { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 28px 32px; margin-bottom: 16px; position: relative; transition: all 0.3s; opacity: 0; transform: translateY(10px); }
    .roast-card.visible { opacity: 1; transform: translateY(0); }
    .roast-card:hover { border-color: var(--gold); box-shadow: 0 8px 30px rgba(201,168,76,0.1); }
    .roast-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .roast-names { display: flex; align-items: center; gap: 10px; }
    .roast-by { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); }
    .roast-arrow { color: var(--muted); }
    .roast-target { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; padding: 2px 10px; background: rgba(255,100,100,0.15); border: 1px solid rgba(255,100,100,0.3); color: #ffb0b0; border-radius: 2px; }
    .roast-date { font-family: 'Raleway', sans-serif; font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; }
    .roast-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem; color: var(--white); line-height: 1.7; margin-bottom: 16px; }
    .vote-section { border-top: 1px solid var(--gold-border); padding-top: 14px; }
    .vote-label { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 10px; display: block; }
    .vote-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .fire-count { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold-bright); min-width: 30px; }
    .vote-progress { flex: 1; height: 6px; background: var(--gold-border); border-radius: 3px; overflow: hidden; }
    .vote-fill { height: 100%; background: linear-gradient(90deg, var(--gold-bright), var(--gold)); transition: width 0.5s ease; border-radius: 3px; }
    .vote-footer { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .vote-select { flex: 1; background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.75rem; letter-spacing: 1px; padding: 8px 12px; outline: none; transition: all 0.3s; }
    .vote-select:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .vote-select option { background: #0f0f0c; }
    .vote-btn { background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 2px; padding: 8px 14px; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
    .vote-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.15); }
    .roast-delete { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; opacity: 0; transition: all 0.3s; letter-spacing: 1px; font-family: 'Raleway', sans-serif; }
    .roast-card:hover .roast-delete { opacity: 1; color: var(--gold); }
    .voters-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .voter-chip { font-size: 0.6rem; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 2px; padding: 2px 8px; color: var(--muted); }
    .loading { text-align: center; padding: 60px 24px; }
    .loading-spinner { width: 40px; height: 40px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 3px; padding: 12px 28px; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { nav { padding: 0 24px; } .hero { padding: 120px 24px 40px; } .content { padding: 0 24px 80px; } .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>
<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I · Squad Feed</span>
  <h1 class="page-title">🎭 Roast Battle</h1>
  <p class="page-sub">"Submit your roasts. The squad votes. No mercy. 😂"</p>
</section>
<div class="content">
  <div class="add-panel">
    <p class="panel-title">Drop a Roast 🔥</p>
    <div class="form-grid">
      <div class="input-group"><label>Roasting (From)</label><select id="roastBy"><option value="">Select your name...</option></select></div>
      <div class="input-group"><label>Target 🎯</label><select id="roastTarget"><option value="">Who are you roasting?</option></select></div>
    </div>
    <div class="input-group" style="margin-bottom:20px">
      <label>The Roast 😂</label>
      <textarea id="roastText" placeholder="Make it hurt (but keep it fun) 😂"></textarea>
    </div>
    <button class="btn-post" onclick="postRoast()"><span>Submit Roast 🎭</span></button>
  </div>
  <div class="section-header"><h3>The Roast Board</h3><div class="rule"></div></div>
  <div id="roastList">
    <div class="loading"><div class="loading-spinner"></div><p>Loading roasts...</p></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://whgxunnlxhcfthkpcbjd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE'
  );

  let memberNames = [];

  async function loadMembers() {
    const { data } = await sb.from('members').select('name').order('name');
    memberNames = (data || []).map(m => m.name);
    ['roastBy', 'roastTarget'].forEach((id, idx) => {
      const sel = document.getElementById(id);
      const placeholder = idx === 0 ? 'Select your name...' : 'Who are you roasting?';
      sel.innerHTML = `<option value="">${placeholder}</option>`;
      memberNames.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });
    });
  }

  function buildVoterSelect(roastId, voters) {
    const sel = document.createElement('select');
    sel.className = 'vote-select';
    sel.id = `voter-${roastId}`;
    sel.innerHTML = '<option value="">Your name to vote...</option>';
    memberNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      if ((voters || []).includes(name)) opt.disabled = true;
      sel.appendChild(opt);
    });
    return sel;
  }

  async function postRoast() {
    const by     = document.getElementById('roastBy').value;
    const target = document.getElementById('roastTarget').value;
    const text   = document.getElementById('roastText').value.trim();
    if (!by)     return alert('Select your name!');
    if (!target) return alert('Select who you are roasting!');
    if (by === target) return alert('You cannot roast yourself! 😂');
    if (!text)   return alert('Write the roast!');
    const date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    await sb.from('roasts').insert({ by_name: by, target_name: target, roast_text: text, date, fires: 0, voters: [] });
    showToast('Roast submitted!! 🔥😂');
    document.getElementById('roastBy').value = '';
    document.getElementById('roastTarget').value = '';
    document.getElementById('roastText').value = '';
    loadRoasts();
  }

  async function fireRoast(id, currentFires, voters) {
    const sel  = document.getElementById(`voter-${id}`);
    const name = sel ? sel.value : '';
    if (!name) return alert('Select your name to vote!');
    if ((voters || []).includes(name)) return alert(`${name} already voted!`);
    const newVoters = [...(voters || []), name];
    await sb.from('roasts').update({ fires: currentFires + 1, voters: newVoters }).eq('id', id);
    showToast('🔥 Fire!!');
    loadRoasts();
  }

  async function deleteRoast(id) {
    if (!confirm('Delete this roast?')) return;
    await sb.from('roasts').delete().eq('id', id);
    showToast('Roast deleted.');
    loadRoasts();
  }

  async function loadRoasts() {
    const { data } = await sb.from('roasts').select('*').order('fires', { ascending: false });
    renderRoasts(data || []);
  }

  function renderRoasts(roasts) {
    const list = document.getElementById('roastList');
    if (roasts.length === 0) { list.innerHTML = '<div class="empty-state"><span class="empty-icon">🎭</span><p>No roasts yet. Someone start it 😂</p></div>'; return; }
    const maxFires = Math.max(...roasts.map(r => r.fires || 0), 1);
    list.innerHTML = '';
    roasts.forEach((r, i) => {
      const pct = Math.round(((r.fires || 0) / maxFires) * 100);
      const votersHTML = (r.voters || []).map(v => `<span class="voter-chip">${v}</span>`).join('');
      const card = document.createElement('div');
      card.className = 'roast-card';
      card.style.transitionDelay = `${i * 0.05}s`;
      card.innerHTML = `
        <button class="roast-delete" onclick="deleteRoast(${r.id})">✕ delete</button>
        <div class="roast-header">
          <div class="roast-names">
            <span class="roast-by">${r.by_name}</span>
            <span class="roast-arrow">🎯</span>
            <span class="roast-target">${r.target_name}</span>
          </div>
          <span class="roast-date">${r.date}</span>
        </div>
        <p class="roast-text">"${r.roast_text}"</p>
        <div class="vote-section">
          <span class="vote-label">🔥 ${r.fires || 0} Fire${r.fires !== 1 ? 's' : ''}</span>
          <div class="vote-bar-wrap">
            <span class="fire-count">🔥</span>
            <div class="vote-progress"><div class="vote-fill" style="width:${pct}%"></div></div>
          </div>
          ${votersHTML ? `<div class="voters-wrap">${votersHTML}</div>` : ''}
          <div class="vote-footer" id="voteFooter-${r.id}"></div>
        </div>
      `;
      list.appendChild(card);
      // inject voter select
      const footer = document.getElementById(`voteFooter-${r.id}`);
      footer.appendChild(buildVoterSelect(r.id, r.voters));
      const voteBtn = document.createElement('button');
      voteBtn.className = 'vote-btn';
      voteBtn.textContent = '🔥 Fire!';
      voteBtn.onclick = () => fireRoast(r.id, r.fires || 0, r.voters || []);
      footer.appendChild(voteBtn);
    });
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.roast-card').forEach(c => observer.observe(c));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  sb.channel('roasts').on('postgres_changes', { event: '*', schema: 'public', table: 'roasts' }, () => loadRoasts()).subscribe();
  loadMembers().then(() => loadRoasts());
</script>
</body>
</html>
