<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Shoutouts</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080806; --gold: #C9A84C; --gold-bright: #FFD700; --gold-border: rgba(201,168,76,0.25); --gold-dim: rgba(201,168,76,0.08); --white: #f5f0e8; --muted: rgba(245,240,232,0.45); --card-bg: rgba(15,15,12,0.9); }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; background: rgba(8,8,6,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .content { max-width: 800px; margin: 0 auto; padding: 0 48px 100px; }
    .add-panel { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 36px; margin-bottom: 60px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
    .panel-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }
    select, textarea { background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px; outline: none; transition: all 0.3s ease; width: 100%; }
    select:focus, textarea:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
    select option { background: #0f0f0c; }
    textarea { resize: vertical; min-height: 100px; }
    textarea::placeholder { color: var(--muted); font-size: 0.75rem; }
    .vibe-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .vibe-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); }
    .vibe-btn { background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 3px; padding: 7px 11px; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
    .vibe-btn:hover, .vibe-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.15); transform: scale(1.1); }
    .btn-post { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; padding: 14px 40px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 24px rgba(201,168,76,0.2); position: relative; overflow: hidden; }
    .btn-post::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-post:hover::before { opacity: 1; }
    .btn-post:hover { transform: translateY(-1px); }
    .btn-post span { position: relative; z-index: 1; }
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .section-header h3 { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); white-space: nowrap; }
    .section-header .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }
    .shoutout-card { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 28px 32px; margin-bottom: 16px; position: relative; transition: all 0.3s; opacity: 0; transform: translateY(10px); }
    .shoutout-card.visible { opacity: 1; transform: translateY(0); }
    .shoutout-card:hover { border-color: var(--gold); box-shadow: 0 8px 30px rgba(201,168,76,0.1); }
    .shoutout-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .shoutout-from-to { display: flex; align-items: center; gap: 10px; }
    .shoutout-from { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); }
    .shoutout-arrow { color: var(--muted); font-size: 0.8rem; }
    .shoutout-to { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--bg); background: var(--gold); padding: 2px 10px; border-radius: 2px; }
    .shoutout-time { font-family: 'Raleway', sans-serif; font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; }
    .shoutout-vibe { font-size: 1.4rem; margin-bottom: 8px; display: block; }
    .shoutout-msg { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem; color: var(--white); line-height: 1.7; }
    .shoutout-footer { display: flex; align-items: center; gap: 16px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--gold-border); }
    .like-btn { background: none; border: 1px solid var(--gold-border); border-radius: 2px; color: var(--muted); font-family: 'Raleway', sans-serif; font-size: 0.7rem; letter-spacing: 1px; padding: 5px 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .like-btn:hover { border-color: var(--gold); color: var(--gold); }
    .like-btn.liked { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .shoutout-delete { background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; transition: color 0.3s; letter-spacing: 1px; font-family: 'Raleway', sans-serif; margin-left: auto; opacity: 0; }
    .shoutout-card:hover .shoutout-delete { opacity: 1; color: var(--gold); }
    .loading { text-align: center; padding: 60px 24px; }
    .loading-spinner { width: 40px; height: 40px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 3px; padding: 12px 28px; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { nav { padding: 0 24px; } .hero { padding: 120px 24px 40px; } .content { padding: 0 24px 80px; } .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>
<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I · Squad Feed</span>
  <h1 class="page-title">💬 Shoutouts</h1>
  <p class="page-sub">"Good vibes only. Leave a message for your people."</p>
</section>
<div class="content">
  <div class="add-panel">
    <p class="panel-title">Drop a Shoutout</p>
    <div class="form-grid">
      <div class="input-group"><label>From</label><select id="fromName"><option value="">Select your name...</option></select></div>
      <div class="input-group"><label>To</label><select id="toName"><option value="">Who's it for?</option></select></div>
    </div>
    <div class="input-group" style="margin-bottom:16px">
      <label>Message</label>
      <textarea id="shoutMsg" placeholder="Say something nice... or funny 😂"></textarea>
    </div>
    <div class="vibe-row">
      <span class="vibe-label">Vibe</span>
      <button class="vibe-btn selected" data-vibe="💛">💛</button>
      <button class="vibe-btn" data-vibe="🔥">🔥</button>
      <button class="vibe-btn" data-vibe="😂">😂</button>
      <button class="vibe-btn" data-vibe="🥹">🥹</button>
      <button class="vibe-btn" data-vibe="👑">👑</button>
      <button class="vibe-btn" data-vibe="🫂">🫂</button>
      <button class="vibe-btn" data-vibe="🎉">🎉</button>
      <button class="vibe-btn" data-vibe="💪">💪</button>
    </div>
    <button class="btn-post" onclick="postShoutout()"><span>Post Shoutout</span></button>
  </div>
  <div class="section-header"><h3>Shoutout Wall</h3><div class="rule"></div></div>
  <div id="shoutoutsList">
    <div class="loading"><div class="loading-spinner"></div><p>Loading shoutouts...</p></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://whgxunnlxhcfthkpcbjd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE'
  );

  let selectedVibe = '💛';

  document.querySelectorAll('.vibe-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.vibe-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedVibe = btn.dataset.vibe;
    });
  });

  async function loadMembers() {
    const { data } = await sb.from('members').select('name').order('name');
    const members = data || [];
    ['fromName', 'toName'].forEach(id => {
      const sel = document.getElementById(id);
      const placeholder = id === 'fromName' ? 'Select your name...' : "Who's it for?";
      sel.innerHTML = `<option value="">${placeholder}</option>`;
      members.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.name; opt.textContent = m.name;
        sel.appendChild(opt);
      });
    });
  }

  async function postShoutout() {
    const from = document.getElementById('fromName').value;
    const to   = document.getElementById('toName').value;
    const msg  = document.getElementById('shoutMsg').value.trim();
    if (!from) return alert('Select your name!');
    if (!to)   return alert('Select who this is for!');
    if (!msg)  return alert('Write your message!');
    const date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    const time = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    await sb.from('shoutouts').insert({ from_name: from, to_name: to, message: msg, vibe: selectedVibe, date, time, likes: 0 });
    showToast('Shoutout posted!! 💛');
    document.getElementById('fromName').value = '';
    document.getElementById('toName').value = '';
    document.getElementById('shoutMsg').value = '';
    loadShoutouts();
  }

  async function likeShoutout(id, current) {
    const likedKey = `liked_shoutout_${id}`;
    if (localStorage.getItem(likedKey)) { showToast('You already liked this! 😄'); return; }
    await sb.from('shoutouts').update({ likes: current + 1 }).eq('id', id);
    localStorage.setItem(likedKey, '1');
    loadShoutouts();
  }

  async function deleteShoutout(id) {
    if (!confirm('Delete this shoutout?')) return;
    await sb.from('shoutouts').delete().eq('id', id);
    showToast('Shoutout deleted.');
    loadShoutouts();
  }

  async function loadShoutouts() {
    const { data } = await sb.from('shoutouts').select('*').order('created_at', { ascending: false });
    renderShoutouts(data || []);
  }

  function renderShoutouts(shoutouts) {
    const list = document.getElementById('shoutoutsList');
    if (shoutouts.length === 0) { list.innerHTML = '<div class="empty-state"><span class="empty-icon">💬</span><p>No shoutouts yet. Be the first! 💛</p></div>'; return; }
    list.innerHTML = '';
    shoutouts.forEach((s, i) => {
      const liked = localStorage.getItem(`liked_shoutout_${s.id}`);
      const card = document.createElement('div');
      card.className = 'shoutout-card';
      card.style.transitionDelay = `${i * 0.05}s`;
      card.innerHTML = `
        <div class="shoutout-header">
          <div class="shoutout-from-to">
            <span class="shoutout-from">${s.from_name}</span>
            <span class="shoutout-arrow">→</span>
            <span class="shoutout-to">${s.to_name}</span>
          </div>
          <span class="shoutout-time">${s.date} · ${s.time}</span>
        </div>
        <span class="shoutout-vibe">${s.vibe}</span>
        <p class="shoutout-msg">"${s.message}"</p>
        <div class="shoutout-footer">
          <button class="like-btn${liked ? ' liked' : ''}" onclick="likeShoutout(${s.id}, ${s.likes})">${liked ? '💛' : '🤍'} ${s.likes} ${s.likes === 1 ? 'like' : 'likes'}</button>
          <button class="shoutout-delete" onclick="deleteShoutout(${s.id})">✕ delete</button>
        </div>
      `;
      list.appendChild(card);
    });
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.shoutout-card').forEach(c => observer.observe(c));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  sb.channel('shoutouts').on('postgres_changes', { event: '*', schema: 'public', table: 'shoutouts' }, () => loadShoutouts()).subscribe();
  loadMembers();
  loadShoutouts();
</script>
</body>
</html>
