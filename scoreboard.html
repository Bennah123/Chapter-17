<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Scoreboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080806; --gold: #C9A84C; --gold-bright: #FFD700; --gold-border: rgba(201,168,76,0.25); --gold-dim: rgba(201,168,76,0.08); --white: #f5f0e8; --muted: rgba(245,240,232,0.45); --card-bg: rgba(15,15,12,0.9); }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; background: rgba(8,8,6,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .content { max-width: 1000px; margin: 0 auto; padding: 0 48px 100px; }

    /* Top 3 podium */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 60px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
    .podium-slot { text-align: center; flex: 1; max-width: 200px; }
    .podium-block { border-radius: 4px 4px 0 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 20px 10px; position: relative; }
    .podium-block.first  { height: 180px; background: linear-gradient(180deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05)); border: 1px solid rgba(255,215,0,0.4); }
    .podium-block.second { height: 140px; background: linear-gradient(180deg, rgba(201,168,76,0.15), rgba(201,168,76,0.03)); border: 1px solid var(--gold-border); }
    .podium-block.third  { height: 110px; background: linear-gradient(180deg, rgba(180,140,60,0.1), rgba(180,140,60,0.02)); border: 1px solid rgba(180,140,60,0.2); }
    .podium-rank { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 2.5rem; color: var(--gold-bright); display: block; filter: drop-shadow(0 0 10px rgba(255,215,0,0.4)); }
    .podium-name { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--white); margin-top: 8px; display: block; }
    .podium-wins { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--gold); display: block; }
    .podium-crown { font-size: 1.8rem; position: absolute; top: -30px; }

    /* Filter tabs */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid var(--gold-border); border-radius: 2px; color: var(--muted); font-family: 'Raleway', sans-serif; font-size: 0.7rem; letter-spacing: 2px; padding: 8px 20px; cursor: pointer; transition: all 0.3s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    /* Section header */
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .section-header h3 { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); white-space: nowrap; }
    .section-header .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }

    /* Leaderboard table */
    .leaderboard { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; overflow: hidden; margin-bottom: 60px; }
    .lb-row { display: grid; grid-template-columns: 60px 1fr 120px 120px 120px; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--gold-border); transition: background 0.2s; }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--gold-dim); }
    .lb-row.header { background: rgba(201,168,76,0.05); }
    .lb-row.header span { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 4px; color: var(--gold); }
    .lb-rank { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.4rem; color: var(--gold-bright); }
    .lb-rank.top { filter: drop-shadow(0 0 8px rgba(255,215,0,0.4)); }
    .lb-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--white); }
    .lb-stat { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--muted); text-align: center; }
    .lb-stat.highlight { color: var(--gold-bright); font-weight: 700; }
    .lb-game-badge { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 2px; padding: 2px 8px; border-radius: 2px; background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold); display: inline-block; }

    /* Recent matches */
    .match-card { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 20px 24px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; transition: all 0.3s; opacity: 0; transform: translateY(10px); }
    .match-card.visible { opacity: 1; transform: translateY(0); }
    .match-card:hover { border-color: var(--gold); }
    .match-game { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); }
    .match-players { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--muted); }
    .match-winner { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.1rem; color: var(--gold-bright); }
    .match-date { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 3px; color: var(--muted); }

    .loading { text-align: center; padding: 60px 24px; }
    .loading-spinner { width: 40px; height: 40px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { nav { padding: 0 24px; } .hero { padding: 120px 24px 40px; } .content { padding: 0 24px 80px; } .lb-row { grid-template-columns: 40px 1fr 80px; } .lb-row .lb-stat:nth-child(4), .lb-row .lb-stat:nth-child(5) { display: none; } .podium { gap: 8px; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>
<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I · Games Arena</span>
  <h1 class="page-title">🏆 Scoreboard</h1>
  <p class="page-sub">"The Chapter 17 Hall of Champions."</p>
</section>
<div class="content">
  <!-- Podium -->
  <div class="podium" id="podium"></div>

  <!-- Filter -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All Games</button>
    <button class="filter-btn" onclick="setFilter('Chess', this)">Chess ♟️</button>
    <button class="filter-btn" onclick="setFilter('Trivia Duel', this)">Trivia 🧠</button>
    <button class="filter-btn" onclick="setFilter('Math Duel', this)">Math 🔢</button>
    <button class="filter-btn" onclick="setFilter('Heist', this)">Heist 🕵️</button>
    <button class="filter-btn" onclick="setFilter('Truth or Dare', this)">Truth/Dare 🎭</button>
    <button class="filter-btn" onclick="setFilter('Would you rather', this)">Would You Rather 🤔</button>
    <button class="filter-btn" onclick="setFilter('Checkers', this)">Checkers ⬛</button>
  </div>

  <!-- Leaderboard -->
  <div class="section-header"><h3>Overall Rankings</h3><div class="rule"></div></div>
  <div class="leaderboard" id="leaderboard">
    <div class="loading"><div class="loading-spinner"></div><p>Loading rankings...</p></div>
  </div>

  <!-- Recent matches -->
  <div class="section-header"><h3>Recent Matches</h3><div class="rule"></div></div>
  <div id="recentMatches">
    <div class="loading"><div class="loading-spinner"></div><p>Loading matches...</p></div>
  </div>
</div>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://whgxunnlxhcfthkpcbjd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE'
  );

  let allScores = [];
  let activeFilter = 'all';

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  }

  async function loadScores() {
    const { data, error } = await sb.from('scores').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    allScores = data || [];
    renderAll();
  }

  function renderAll() {
    const filtered = activeFilter === 'all' ? allScores : allScores.filter(s => s.game === activeFilter);
    renderLeaderboard(filtered);
    renderRecent(filtered);
    renderPodium(filtered);
  }

  function buildStats(scores) {
    const stats = {};
    scores.forEach(s => {
      if (!stats[s.winner]) stats[s.winner] = { wins: 0, games: new Set() };
      stats[s.winner].wins++;
      stats[s.winner].games.add(s.game);
      (s.players || []).forEach(p => {
        if (!stats[p]) stats[p] = { wins: 0, games: new Set() };
        stats[p].games.add(s.game);
      });
    });
    return Object.entries(stats).map(([name, d]) => ({ name, wins: d.wins, games: d.games.size })).sort((a, b) => b.wins - a.wins);
  }

  function renderPodium(scores) {
    const stats = buildStats(scores);
    const podium = document.getElementById('podium');
    if (stats.length === 0) { podium.innerHTML = ''; return; }
    const top3 = stats.slice(0, 3);
    const order = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3.length === 2 ? [top3[1], top3[0]] : [top3[0]];
    const classes = top3.length >= 3 ? ['second', 'first', 'third'] : top3.length === 2 ? ['second', 'first'] : ['first'];
    const crowns = ['🥈', '👑', '🥉'];
    podium.innerHTML = order.map((p, i) => `
      <div class="podium-slot">
        <div class="podium-block ${classes[i]}">
          <span class="podium-crown">${crowns[i]}</span>
          <span class="podium-rank">${p.wins}</span>
          <span class="podium-wins">win${p.wins !== 1 ? 's' : ''}</span>
        </div>
        <span class="podium-name" style="margin-top:8px;display:block">${p.name}</span>
      </div>
    `).join('');
  }

  function renderLeaderboard(scores) {
    const stats = buildStats(scores);
    const lb = document.getElementById('leaderboard');
    if (stats.length === 0) {
      lb.innerHTML = '<div class="empty-state"><span class="empty-icon">🏆</span><p>No games played yet. Go play something! 😂</p></div>';
      return;
    }
    lb.innerHTML = `
      <div class="lb-row header">
        <span>#</span><span>Player</span><span style="text-align:center">Wins</span><span style="text-align:center">Games</span><span style="text-align:center">Win Rate</span>
      </div>
      ${stats.map((p, i) => {
        const totalGames = scores.filter(s => (s.players || []).includes(p.name) || s.winner === p.name).length;
        const winRate = totalGames > 0 ? Math.round((p.wins / totalGames) * 100) : 0;
        return `
          <div class="lb-row">
            <span class="lb-rank${i < 3 ? ' top' : ''}">${i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</span>
            <span class="lb-name">${p.name}</span>
            <span class="lb-stat highlight">${p.wins}</span>
            <span class="lb-stat">${totalGames}</span>
            <span class="lb-stat">${winRate}%</span>
          </div>
        `;
      }).join('')}
    `;
  }

  function renderRecent(scores) {
    const recent = document.getElementById('recentMatches');
    if (scores.length === 0) {
      recent.innerHTML = '<div class="empty-state"><span class="empty-icon">🎮</span><p>No matches yet.</p></div>';
      return;
    }
    recent.innerHTML = '';
    scores.slice(0, 20).forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'match-card';
      card.style.transitionDelay = `${i * 0.05}s`;
      card.innerHTML = `
        <div>
          <span class="match-game">${s.game}</span>
          <p class="match-players">${(s.players || []).join(' vs ')}</p>
        </div>
        <div style="text-align:center">
          <p class="match-winner">🏆 ${s.winner}</p>
        </div>
        <span class="match-date">${s.date}</span>
      `;
      recent.appendChild(card);
    });
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.match-card').forEach(c => observer.observe(c));
  }

  sb.channel('scores').on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, () => loadScores()).subscribe();
  loadScores();
</script>
</body>
</html>
