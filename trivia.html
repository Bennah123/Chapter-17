<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Trivia Duel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080806; --gold: #C9A84C; --gold-bright: #FFD700; --gold-border: rgba(201,168,76,0.25); --gold-dim: rgba(201,168,76,0.08); --white: #f5f0e8; --muted: rgba(245,240,232,0.45); --card-bg: rgba(15,15,12,0.9); --correct: rgba(50,200,100,0.2); --wrong: rgba(200,50,50,0.2); --correct-border: rgba(50,200,100,0.6); --wrong-border: rgba(200,50,50,0.6); }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; background: rgba(8,8,6,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .hero { padding: 100px 48px 40px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .content { max-width: 800px; margin: 0 auto; padding: 0 24px 100px; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* LOBBY */
    .lobby-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .panel { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 32px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .panel h3 { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 20px; text-align: center; }
    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .input-group label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }
    select, input[type="text"] { background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px; outline: none; transition: all 0.3s ease; width: 100%; }
    select:focus, input[type="text"]:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    select option { background: #0f0f0c; }
    input[type="text"]::placeholder { color: var(--muted); font-size: 0.75rem; }
    .btn-gold { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; padding: 14px; cursor: pointer; width: 100%; transition: all 0.3s; box-shadow: 0 0 24px rgba(201,168,76,0.2); position: relative; overflow: hidden; margin-top: 8px; }
    .btn-gold::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-gold:hover::before { opacity: 1; }
    .btn-gold:hover { transform: translateY(-1px); }
    .btn-gold span { position: relative; z-index: 1; }

    /* WAITING */
    .waiting-card { background: var(--card-bg); border: 1px solid var(--gold); border-radius: 4px; padding: 40px; text-align: center; }
    .room-code-display { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 3.5rem; color: var(--gold-bright); letter-spacing: 8px; filter: drop-shadow(0 0 20px rgba(255,215,0,0.4)); display: block; margin: 16px 0; }
    .waiting-text { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); font-size: 1rem; letter-spacing: 2px; }
    .pulse-dot { display: inline-block; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: pulseDot 1.2s ease-in-out infinite; margin: 0 3px; }
    .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
    .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulseDot { 0%,80%,100% { opacity:0.3; transform:scale(0.8); } 40% { opacity:1; transform:scale(1.2); } }

    /* GAME */
    .score-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 20px 28px; margin-bottom: 20px; }
    .score-player { text-align: center; }
    .score-player.active-p { border-radius: 3px; background: var(--gold-dim); padding: 8px; border: 1px solid var(--gold-border); }
    .score-name { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); display: block; margin-bottom: 4px; }
    .score-num { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 2.5rem; color: var(--gold-bright); filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); display: block; }
    .you-tag { font-family: 'Cinzel', serif; font-size: 0.45rem; letter-spacing: 2px; background: var(--gold); color: #080806; padding: 1px 6px; border-radius: 2px; display: inline-block; margin-top: 4px; }
    .score-vs { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 4px; color: var(--muted); text-align: center; }
    .progress-wrap { margin-bottom: 20px; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .progress-info span { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 3px; color: var(--muted); }
    .progress-bar { height: 3px; background: var(--gold-border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); transition: width 0.5s ease; }
    .timer-wrap { text-align: center; margin-bottom: 20px; }
    .timer-circle { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--gold-border); font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.6rem; color: var(--gold-bright); transition: all 0.3s; }
    .timer-circle.urgent { border-color: #ff6b6b; color: #ff6b6b; animation: urgentPulse 0.5s ease-in-out infinite; }
    @keyframes urgentPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
    .question-card { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 32px; margin-bottom: 20px; text-align: center; }
    .q-category { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 14px; display: block; }
    .q-text { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(1.1rem,3vw,1.5rem); color: var(--white); line-height: 1.4; }
    .q-asking { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--muted); margin-top: 10px; }
    .answers-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .answer-btn { background: rgba(201,168,76,0.04); border: 1px solid var(--gold-border); border-radius: 3px; padding: 16px; cursor: pointer; font-family: 'Raleway', sans-serif; font-size: 0.85rem; color: var(--white); letter-spacing: 0.5px; text-align: left; transition: all 0.3s ease; }
    .answer-btn:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-dim); }
    .answer-btn.correct { background: var(--correct); border-color: var(--correct-border); color: #7fff9a; }
    .answer-btn.wrong   { background: var(--wrong);   border-color: var(--wrong-border);   color: #ff9a9a; }
    .answer-btn:disabled { cursor: default; }
    .answer-letter { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 2px; color: var(--gold); margin-right: 10px; }
    .feedback { text-align: center; padding: 14px; border-radius: 3px; margin-bottom: 16px; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; min-height: 52px; }
    .feedback.correct-fb { background: var(--correct); border: 1px solid var(--correct-border); color: #7fff9a; }
    .feedback.wrong-fb   { background: var(--wrong);   border: 1px solid var(--wrong-border);   color: #ff9a9a; }
    .waiting-opponent { text-align: center; padding: 20px; font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); font-size: 1rem; letter-spacing: 2px; }

    /* RESULTS */
    .results-card { background: var(--card-bg); border: 1px solid var(--gold); border-radius: 4px; padding: 48px; text-align: center; position: relative; overflow: hidden; }
    .results-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(201,168,76,0.07) 0%, transparent 70%); pointer-events: none; }
    .result-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; }
    .result-winner { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2rem,7vw,4rem); background: linear-gradient(160deg, #fff8e7, var(--gold-bright), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
    .result-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); margin-bottom: 32px; }
    .result-scores { display: flex; justify-content: center; gap: 40px; margin-bottom: 32px; }
    .result-player { text-align: center; }
    .result-player-name { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); display: block; margin-bottom: 6px; }
    .result-player-score { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 700; color: var(--white); display: block; }
    .btn-play-again { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; padding: 14px 48px; cursor: pointer; transition: all 0.3s; }
    .btn-play-again:hover { opacity: 0.9; transform: translateY(-1px); }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 3px; padding: 12px 28px; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { nav { padding: 0 20px; } .hero { padding: 90px 20px 30px; } .lobby-grid { grid-template-columns: 1fr; } .answers-wrap { grid-template-columns: 1fr; } .score-bar { padding: 14px; gap: 8px; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>
<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I · Games Arena</span>
  <h1 class="page-title">🧠 Trivia Duel</h1>
</section>
<div class="content">

  <!-- LOBBY -->
  <div class="screen active" id="lobbyScreen">
    <div class="lobby-grid">
      <div class="panel">
        <h3>Create Game</h3>
        <div class="input-group"><label>Your Name</label><select id="createName"><option value="">Select name...</option></select></div>
        <div class="input-group"><label>Questions Each</label>
          <select id="qCount"><option value="5">5 Questions</option><option value="10" selected>10 Questions</option><option value="15">15 Questions</option></select>
        </div>
        <div class="input-group"><label>Seconds Per Question</label>
          <select id="timeLimit"><option value="15">15 seconds</option><option value="20" selected>20 seconds</option><option value="30">30 seconds</option></select>
        </div>
        <button class="btn-gold" onclick="createGame()"><span>Create Game Room</span></button>
      </div>
      <div class="panel" style="animation-delay:0.7s">
        <h3>Join Game</h3>
        <div class="input-group"><label>Your Name</label><select id="joinName"><option value="">Select name...</option></select></div>
        <div class="input-group"><label>Room Code</label><input type="text" id="roomCodeInput" placeholder="e.g. T17-4829" style="text-transform:uppercase"/></div>
        <button class="btn-gold" onclick="joinGame()"><span>Join Game Room</span></button>
      </div>
    </div>
  </div>

  <!-- WAITING -->
  <div class="screen" id="waitingScreen">
    <div class="waiting-card">
      <p style="font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:5px;color:var(--gold)">Room Code</p>
      <span class="room-code-display" id="roomCodeDisplay">----</span>
      <p class="waiting-text">Share this code with your opponent</p>
      <br/>
      <p class="waiting-text">Waiting for opponent <span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span></p>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="gameScreen">
    <div class="score-bar">
      <div class="score-player" id="scoreP1wrap">
        <span class="score-name" id="scoreP1name">P1</span>
        <span class="score-num" id="scoreP1">0</span>
        <span class="you-tag" id="youP1" style="display:none">YOU</span>
      </div>
      <div class="score-vs">VS</div>
      <div class="score-player" id="scoreP2wrap">
        <span class="score-name" id="scoreP2name">P2</span>
        <span class="score-num" id="scoreP2">0</span>
        <span class="you-tag" id="youP2" style="display:none">YOU</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span id="progressLabel">Question 1</span><span id="progressFrac">1/10</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="timer-wrap"><div class="timer-circle" id="timerCircle">20</div></div>
    <div class="question-card">
      <span class="q-category" id="qCategory">Category</span>
      <p class="q-text" id="qText">Question</p>
      <p class="q-asking" id="qAsking"></p>
    </div>
    <div class="answers-wrap" id="answersWrap"></div>
    <div class="feedback" id="feedback"></div>
    <div class="waiting-opponent" id="waitingOpponent" style="display:none">⏳ Waiting for opponent's answer...</div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="resultsScreen">
    <div class="results-card">
      <span class="result-tag">X V I I · Results</span>
      <p class="result-winner" id="resultWinner">🏆 Winner!!</p>
      <p class="result-sub" id="resultSub"></p>
      <div class="result-scores">
        <div class="result-player"><span class="result-player-name" id="resP1name">P1</span><span class="result-player-score" id="resP1score">0</span></div>
        <div class="result-player"><span class="result-player-name" id="resP2name">P2</span><span class="result-player-score" id="resP2score">0</span></div>
      </div>
      <button class="btn-play-again" onclick="goLobby()">Play Again</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://whgxunnlxhcfthkpcbjd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE'
);

const DEFAULT_QUESTIONS = [
  { q:"How many people are in Chapter 17?", opts:["9","11","13","15"], a:1, cat:"Chapter 17 👥" },
  { q:"How many couples are in Chapter 17?", opts:["5","6","7","8"], a:3, cat:"Chapter 17 💑" },
  { q:"What is the capital of Kenya?", opts:["Mombasa","Kisumu","Nairobi","Nakuru"], a:2, cat:"Geography 🌍" },
  { q:"Which planet is closest to the Sun?", opts:["Venus","Earth","Mars","Mercury"], a:3, cat:"Science 🔭" },
  { q:"What year did World War II end?", opts:["1943","1944","1945","1946"], a:2, cat:"History 📖" },
  { q:"What is 17 × 17?", opts:["269","289","279","299"], a:1, cat:"Math 🔢" },
  { q:"Who painted the Mona Lisa?", opts:["Michelangelo","Raphael","Leonardo da Vinci","Caravaggio"], a:2, cat:"Art 🎨" },
  { q:"What is the longest river in the world?", opts:["Amazon","Congo","Mississippi","Nile"], a:3, cat:"Geography 🌍" },
  { q:"Which element has the symbol 'Au'?", opts:["Silver","Platinum","Gold","Copper"], a:2, cat:"Science ⚗️" },
  { q:"How many bones are in the adult human body?", opts:["196","206","216","226"], a:1, cat:"Science 🦴" },
  { q:"What is the square root of 144?", opts:["11","12","13","14"], a:1, cat:"Math 🔢" },
  { q:"Which country won the 2022 FIFA World Cup?", opts:["Brazil","France","England","Argentina"], a:3, cat:"Sports ⚽" },
  { q:"What does 'HTTP' stand for?", opts:["HyperText Transfer Protocol","High Tech Transfer Protocol","HyperText Transmission Process","None of these"], a:0, cat:"Tech 💻" },
  { q:"What is the hardest natural substance on Earth?", opts:["Quartz","Titanium","Diamond","Graphene"], a:2, cat:"Science 💎" },
  { q:"In what year was the iPhone first released?", opts:["2005","2006","2007","2008"], a:2, cat:"Tech 📱" },
  { q:"What is the chemical formula for water?", opts:["HO","H2O","H3O","H2O2"], a:1, cat:"Science ⚗️" },
  { q:"Which continent is the largest by area?", opts:["Africa","North America","Europe","Asia"], a:3, cat:"Geography 🌍" },
  { q:"How many sides does a hexagon have?", opts:["5","6","7","8"], a:1, cat:"Math 🔢" },
  { q:"Who wrote 'Romeo and Juliet'?", opts:["Charles Dickens","Jane Austen","William Shakespeare","Oscar Wilde"], a:2, cat:"Literature 📚" },
  { q:"What is the speed of light (approx)?", opts:["200,000 km/s","250,000 km/s","300,000 km/s","350,000 km/s"], a:2, cat:"Science 🔭" },
];

// STATE
let myName='', roomId=null, roomCode='', subscription=null;
let isPlayer1=false, qPerPlayer=10, timeLimitSecs=20;
let currentQIndex=0, myScore=0, oppScore=0;
let timerInterval=null, timeLeft=0, myAnswered=false, oppAnswered=false;
let questions=[], gameState=null;

async function loadMembers() {
  const { data } = await sb.from('members').select('name').order('name');
  const names = (data||[]).map(m=>m.name);
  ['createName','joinName'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">Select name...</option>';
    names.forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
  });
}

function genCode() { return 'T17-'+Math.floor(1000+Math.random()*9000); }

function buildQuestions(count) {
  return [...DEFAULT_QUESTIONS].sort(()=>Math.random()-0.5).slice(0, count*2);
}

async function createGame() {
  myName = document.getElementById('createName').value;
  qPerPlayer = parseInt(document.getElementById('qCount').value);
  timeLimitSecs = parseInt(document.getElementById('timeLimit').value);
  if (!myName) return alert('Select your name!');
  roomCode = genCode();
  isPlayer1 = true;
  const qs = buildQuestions(qPerPlayer);
  const initState = { questions:qs, scores:{}, answers:{}, currentQ:0, qPerPlayer, timeLimitSecs, phase:'waiting' };
  const { data, error } = await sb.from('game_rooms').insert({
    room_code:roomCode, game:'Trivia', player1:myName, player2:null,
    status:'waiting', state:initState, turn:myName, winner:null
  }).select().single();
  if (error) return alert('Error creating room!');
  roomId = data.id;
  document.getElementById('roomCodeDisplay').textContent = roomCode;
  showScreen('waitingScreen');
  subscribeRoom(roomId);
}

async function joinGame() {
  myName = document.getElementById('joinName').value;
  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if (!myName) return alert('Select your name!');
  if (!code)   return alert('Enter a room code!');
  const { data } = await sb.from('game_rooms').select('*').eq('room_code',code).eq('game','Trivia').single();
  if (!data)                    return alert('Room not found!');
  if (data.status!=='waiting')  return alert('Game already started!');
  if (data.player1===myName)    return alert('You cannot play against yourself! 😂');
  isPlayer1 = false;
  roomId = data.id;
  roomCode = code;
  const newState = { ...data.state, phase:'active' };
  await sb.from('game_rooms').update({ player2:myName, status:'active', state:newState }).eq('id',roomId);
  subscribeRoom(roomId);
}

function subscribeRoom(id) {
  if (subscription) subscription.unsubscribe();
  subscription = sb.channel(`trivia-${id}`)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'game_rooms', filter:`id=eq.${id}` }, payload => {
      handleUpdate(payload.new);
    }).subscribe();
}

function handleUpdate(room) {
  const state = room.state;
  if (state.phase==='active' && document.getElementById('waitingScreen').classList.contains('active')) {
    startGame(room);
    return;
  }
  if (room.status==='finished') { showFinalResults(room); return; }
  if (state.phase==='active') syncAnswers(room);
}

function startGame(room) {
  gameState = room;
  questions = room.state.questions;
  qPerPlayer = room.state.qPerPlayer;
  timeLimitSecs = room.state.timeLimitSecs;
  currentQIndex = 0; myScore = 0; oppScore = 0;
  const p1 = room.player1, p2 = room.player2;
  document.getElementById('scoreP1name').textContent = p1;
  document.getElementById('scoreP2name').textContent = p2;
  document.getElementById('resP1name').textContent = p1;
  document.getElementById('resP2name').textContent = p2;
  document.getElementById('youP1').style.display = myName===p1?'inline':'none';
  document.getElementById('youP2').style.display = myName===p2?'inline':'none';
  showScreen('gameScreen');
  loadQuestion(room);
}

function loadQuestion(room) {
  if (currentQIndex >= questions.length) { return; }
  const q = questions[currentQIndex];
  const p1 = room.player1, p2 = room.player2;
  const curPlayer = currentQIndex % 2 === 0 ? p1 : p2;
  myAnswered = false; oppAnswered = false;

  // update UI
  document.getElementById('scoreP1').textContent = myName===p1?myScore:oppScore;
  document.getElementById('scoreP2').textContent = myName===p2?myScore:oppScore;
  document.getElementById('scoreP1wrap').classList.toggle('active-p', curPlayer===p1);
  document.getElementById('scoreP2wrap').classList.toggle('active-p', curPlayer===p2);
  const pct = Math.round((currentQIndex/questions.length)*100);
  document.getElementById('progressFill').style.width = Math.max(pct,2)+'%';
  document.getElementById('progressLabel').textContent = `Question ${currentQIndex+1}`;
  document.getElementById('progressFrac').textContent = `${currentQIndex+1}/${questions.length}`;
  document.getElementById('qCategory').textContent = q.cat;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qAsking').textContent = `${curPlayer}'s question`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('waitingOpponent').style.display = 'none';

  const wrap = document.getElementById('answersWrap');
  wrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-letter">${letters[i]}.</span>${opt}`;
    btn.onclick = () => submitAnswer(i, q.a, curPlayer, room);
    wrap.appendChild(btn);
  });
  startTimer(q.a, curPlayer, room);
}

function startTimer(correctIdx, curPlayer, room) {
  clearInterval(timerInterval);
  timeLeft = timeLimitSecs;
  const circle = document.getElementById('timerCircle');
  circle.textContent = timeLeft;
  circle.className = 'timer-circle';
  timerInterval = setInterval(() => {
    timeLeft--;
    circle.textContent = timeLeft;
    if (timeLeft <= 5) circle.className = 'timer-circle urgent';
    if (timeLeft <= 0) { clearInterval(timerInterval); timeoutAnswer(correctIdx, curPlayer, room); }
  }, 1000);
}

async function submitAnswer(chosen, correct, curPlayer, room) {
  clearInterval(timerInterval);
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  revealAnswers(correct, chosen);
  const isMyQuestion = curPlayer === myName;
  let points = 0;
  if (chosen === correct) {
    points = timeLeft > timeLimitSecs*0.6 ? 2 : 1;
    if (isMyQuestion) myScore += points;
    else oppScore += points;
    document.getElementById('feedback').textContent = `✅ Correct!! +${points} point${points>1?'s':''}`;
    document.getElementById('feedback').className = 'feedback correct-fb';
  } else {
    document.getElementById('feedback').textContent = `❌ Wrong! Answer: ${questions[currentQIndex].opts[correct]}`;
    document.getElementById('feedback').className = 'feedback wrong-fb';
  }

  // Push answer to Supabase
  myAnswered = true;
  const state = room.state;
  const ansKey = `q${currentQIndex}_${myName}`;
  const answers = { ...(state.answers||{}), [ansKey]:{ chosen, points, timeLeft } };
  const scores = { ...(state.scores||{}), [myName]:(state.scores?.[myName]||0)+points };
  await sb.from('game_rooms').update({ state:{ ...state, answers, scores } }).eq('id', roomId);

  document.getElementById('waitingOpponent').style.display = 'block';
  // check if both answered
  checkBothAnswered(room, answers, scores);
}

async function timeoutAnswer(correct, curPlayer, room) {
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  revealAnswers(correct, -1);
  document.getElementById('feedback').textContent = `⏰ Time's up! Answer: ${questions[currentQIndex].opts[correct]}`;
  document.getElementById('feedback').className = 'feedback wrong-fb';
  myAnswered = true;
  const state = room.state;
  const ansKey = `q${currentQIndex}_${myName}`;
  const answers = { ...(state.answers||{}), [ansKey]:{ chosen:-1, points:0, timeLeft:0 } };
  await sb.from('game_rooms').update({ state:{ ...state, answers } }).eq('id', roomId);
  document.getElementById('waitingOpponent').style.display = 'block';
  checkBothAnswered(room, answers, state.scores||{});
}

function revealAnswers(correct, chosen) {
  document.querySelectorAll('.answer-btn').forEach((btn,i) => {
    if (i===correct) btn.classList.add('correct');
    else if (i===chosen) btn.classList.add('wrong');
    btn.disabled=true;
  });
}

async function checkBothAnswered(room, answers, scores) {
  const p1Key = `q${currentQIndex}_${room.player1}`;
  const p2Key = `q${currentQIndex}_${room.player2}`;
  if (answers[p1Key] !== undefined && answers[p2Key] !== undefined) {
    // Both answered — advance
    setTimeout(async () => {
      currentQIndex++;
      // update scores from state
      myScore = scores[myName] || 0;
      oppScore = scores[myName===room.player1?room.player2:room.player1] || 0;
      if (currentQIndex >= questions.length) {
        // Game over
        const p1Score = scores[room.player1]||0;
        const p2Score = scores[room.player2]||0;
        let winner = null;
        if (p1Score > p2Score) winner = room.player1;
        else if (p2Score > p1Score) winner = room.player2;
        await sb.from('game_rooms').update({ status:'finished', winner, state:{ ...room.state, answers, scores } }).eq('id',roomId);
        if (winner) await sb.from('scores').insert({ game:'Trivia Duel', winner, players:[room.player1,room.player2], date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) });
      } else {
        const newState = { ...room.state, answers, scores, currentQ:currentQIndex };
        await sb.from('game_rooms').update({ state:newState }).eq('id',roomId);
        // Reload fresh room data
        const { data } = await sb.from('game_rooms').select('*').eq('id',roomId).single();
        if (data) loadQuestion(data);
      }
    }, 1800);
  }
}

function syncAnswers(room) {
  // Opponent answered — update their score display
  const state = room.state;
  const oppName = myName===room.player1?room.player2:room.player1;
  oppScore = state.scores?.[oppName] || 0;
  myScore  = state.scores?.[myName]  || 0;
  document.getElementById('scoreP1').textContent = myName===room.player1?myScore:oppScore;
  document.getElementById('scoreP2').textContent = myName===room.player2?myScore:oppScore;
  // If both answered, advance
  const p1Key = `q${currentQIndex}_${room.player1}`;
  const p2Key = `q${currentQIndex}_${room.player2}`;
  if (state.answers?.[p1Key]!==undefined && state.answers?.[p2Key]!==undefined && myAnswered) {
    checkBothAnswered(room, state.answers, state.scores||{});
  }
}

function showFinalResults(room) {
  clearInterval(timerInterval);
  const state = room.state;
  const p1Score = state.scores?.[room.player1]||0;
  const p2Score = state.scores?.[room.player2]||0;
  document.getElementById('resP1score').textContent = p1Score;
  document.getElementById('resP2score').textContent = p2Score;
  let winnerText, subText;
  if (room.winner) { winnerText=`🏆 ${room.winner} Wins!!`; subText=`${p1Score} - ${p2Score}. IQ supremacy! 😂`; }
  else { winnerText="🤝 It's a Draw!!"; subText=`${p1Score} - ${p2Score}. Evenly matched!`; }
  document.getElementById('resultWinner').textContent = winnerText;
  document.getElementById('resultSub').textContent = subText;
  showScreen('resultsScreen');
}

function goLobby() { if(subscription) subscription.unsubscribe(); showScreen('lobbyScreen'); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

loadMembers();
</script>
