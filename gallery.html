  // ============================================
  // IMAGE COMPRESSION (NEW)
  // Compresses images before upload to save bandwidth/storage
  // ============================================
  async function compressImage(file, maxWidth = 1600, quality = 0.85) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const canvas = document.createElement('canvas');
        const scale = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => {
          if (!blob) return reject(new Error('Canvas toBlob failed'));
          // Create a new File object with the original name
          const compressedFile = new File([blob], file.name, { 
            type: 'image/jpeg', 
            lastModified: Date.now() 
          });
          resolve(compressedFile);
        }, 'image/jpeg', quality);
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('Image load failed'));
      };
      img.src = url;
    });
  }

  // ============================================
  // ADMIN FUNCTIONS
  // ============================================
  function toggleAdmin() {
    if (isAdmin) {
      isAdmin = false;
      document.getElementById('adminBtn').classList.remove('active');

      showToast('Admin mode off');
    } else {
      document.getElementById('adminModal').classList.add('show');
      document.getElementById('adminPassword').focus();
    }

  function verifyAdmin() {
    const input = document.getElementById('adminPassword').value;
    if (input === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('adminBtn').classList.add('active');
      document.getElementById('adminBtn').textContent = '🔓 Admin';
      document.getElementById('adminPassword').value = '';
      closeAdminModal();
      unlockUploadPanel();
      renderGallery();
      showToast('Admin mode unlocked 🔓');
    } else {
      showToast('Wrong password ❌');
      document.getElementById('adminPassword').value = '';
    }

  function closeAdminModal() {
    document.getElementById('adminModal').classList.remove('show');

  function lockUploadPanel() {

  function unlockUploadPanel() {
    document.getElementById('uploadPanel').classList.remove('locked');
  }

  // ============================================
  // MODE TOGGLE
  // ============================================
  function setMode(mode) {
    uploadMode = mode;
    document.getElementById('modeNew').classList.toggle('active', mode === 'new');
    document.getElementById('modeEdit').classList.toggle('active', mode === 'edit');
    document.getElementById('newEventForm').style.display = mode === 'new' ? 'block' : 'none';
    document.getElementById('editEventForm').style.display = mode === 'edit' ? 'block' : 'none';
    if (mode === 'edit') populateEventSelect();
  }

  function populateEventSelect() {
    const events = [...new Set(allMemories.map(m => m.event))].sort();
    const sel = document.getElementById('existingEventSelect');
    sel.innerHTML = '<option value="">Choose an event...</option>';
    events.forEach(ev => {
      const opt = document.createElement('option');
      opt.value = ev;
      opt.textContent = ev;
      sel.appendChild(opt);
    });
  }

  // ============================================
  // FILE HANDLING
  // ============================================
  const fileInput = document.getElementById('fileInput');
  const previewStrip = document.getElementById('previewStrip');
  const dropZone = document.getElementById('dropZone');

  fileInput.addEventListener('change', () => { 
    const newFiles = Array.from(fileInput.files).filter(f => f.type.startsWith('image/'));
    selectedFiles = [...selectedFiles, ...newFiles]; 
    renderPreviews(); 
    // Reset file input so the same file can be selected again
    fileInput.value = '';
  });

  dropZone.addEventListener('dragover', e => { 
    e.preventDefault(); 
    dropZone.classList.add('dragover'); 
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault(); 
    dropZone.classList.remove('dragover');
    const droppedFiles = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    selectedFiles = [...selectedFiles, ...droppedFiles];
    renderPreviews();
  });

  function renderPreviews() {
    previewStrip.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'preview-thumb';
      
      const img = document.createElement('img');
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
      
      const remove = document.createElement('button');
      remove.className = 'remove-thumb';
      remove.innerHTML = '✕';
      remove.onclick = (e) => { 
        e.stopPropagation();
        selectedFiles.splice(idx, 1); 
        renderPreviews(); 
      };
      
      wrap.appendChild(img);
      wrap.appendChild(remove);
      previewStrip.appendChild(wrap);
    });
  }

  // ============================================
  // UPLOAD FUNCTION (FIXED)
  // ============================================
  async function uploadPhotos() {
    if (!isAdmin) return showToast('Admin only 🔒');

    let event, caption;
    if (uploadMode === 'new') {
      event = document.getElementById('eventName').value.trim();
      caption = document.getElementById('photoCaption').value.trim();
      if (!event) return showToast('Please enter an event name!');
    } else {
      event = document.getElementById('existingEventSelect').value;
      caption = document.getElementById('editCaption').value.trim();
      if (!event) return showToast('Please select an event to edit!');
    }
    if (selectedFiles.length === 0) return showToast('Please select at least one photo!');

    const btn = document.getElementById('uploadBtn');
    const btnSpan = btn.querySelector('span');
    const progressBar = document.getElementById('uploadProgress');
    const progressBarInner = document.getElementById('uploadProgressBar');
    
    btn.disabled = true;
    btnSpan.textContent = 'Saving...';
    progressBar.classList.add('active');

    const date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    let successCount = 0;
    let failCount = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      try {
        // Update progress
        const progress = ((i) / selectedFiles.length) * 100;
        progressBarInner.style.width = progress + '%';

        // Compress image before upload (NEW)
        let uploadFile = file;
        if (file.size > 1024 * 1024) { // Only compress if > 1MB
          try {
            uploadFile = await compressImage(file);
            console.log(`Compressed ${file.name}: ${(file.size/1024/1024).toFixed(2)}MB → ${(uploadFile.size/1024/1024).toFixed(2)}MB`);
          } catch (compressErr) {
            console.warn('Compression failed, using original:', compressErr);
            uploadFile = file;
          }
        }

        // Upload to Storage bucket
        const filePath = `memories/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
        const { data: uploadData, error: uploadError } = await sb.storage
          .from('memory-wall')
          .upload(filePath, uploadFile, { contentType: uploadFile.type || 'image/jpeg' });

        if (uploadError) throw new Error(`Storage upload failed: ${uploadError.message}`);

        // Get public URL
        const { data: urlData } = sb.storage.from('memory-wall').getPublicUrl(filePath);
        const src = urlData.publicUrl;

        // Save metadata to database
        const { error: insertError } = await sb.from('memories').insert({ 
          src, 
          caption, 
          event, 
          uploader: 'Admin', 
          date 
        });
        
        if (insertError) {
          console.error('Insert error:', insertError);
          failCount++;
        } else {
          successCount++;
        }
      } catch (err) {
        console.error('Upload error:', err);
        failCount++;
      }
    }

    // Final progress update
    progressBarInner.style.width = '100%';
    setTimeout(() => {
      progressBar.classList.remove('active');
      progressBarInner.style.width = '0%';
    }, 500);

    btn.disabled = false;
    btnSpan.textContent = 'Save to Memory Wall';

    if (successCount > 0) {
      showToast(`${successCount} photo${successCount !== 1 ? 's' : ''} added to "${event}"! 🔥`);
      document.getElementById('eventName').value = '';
      document.getElementById('photoCaption').value = '';
      document.getElementById('editCaption').value = '';
      document.getElementById('existingEventSelect').value = '';
      selectedFiles = []; 
      previewStrip.innerHTML = '';
      loadMemories();
    }
    
    if (failCount > 0) {
      showToast(`${failCount} upload${failCount !== 1 ? 's' : ''} failed ❌`);
    }
    
    if (successCount === 0 && failCount === 0) {
      showToast('No photos to upload');
    }
  }

  // ============================================
  // DATA LOADING & RENDERING (FIXED)
  // ============================================
  async function loadMemories() {
    const gallery = document.getElementById('gallery');
    // Keep loading state visible during refresh
    if (allMemories.length === 0) {
      gallery.innerHTML = `
        <div class="loading" id="loadingState">
          <div class="loading-spinner"></div>
          <p>Loading memories...</p>
        </div>
      `;
    }

    const { data, error } = await sb.from('memories').select('*').order('created_at', { ascending: false });
    if (error) { 
      console.error('Load error:', error); 
      gallery.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">⚠️</span>
          <p>Failed to load memories. Please refresh.</p>
        </div>
      `;
      return; 
    }
    
    allMemories = data || [];
    renderGallery();
    if (uploadMode === 'edit') populateEventSelect();
  }

  function filterEvent(event, btn) {
    activeFilter = event;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery();
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    const filterBar = document.getElementById('filterBar');
    
    // Build filter buttons only when events change (FIXED: prevents flicker)
    const currentEvents = new Set(allMemories.map(m => m.event));
    const eventsChanged = ![...currentEvents].every(e => knownEvents.has(e)) || ![...knownEvents].every(e => currentEvents.has(e));
    
    if (eventsChanged || filterBar.querySelectorAll('.filter-btn').length <= 1) {
      knownEvents = currentEvents;
      // Keep the "All" button, remove old event buttons
      filterBar.querySelectorAll('.filter-btn[data-event]').forEach(b => b.remove());
      
      const sortedEvents = [...currentEvents].sort();
      sortedEvents.forEach(ev => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.event = ev;
        btn.textContent = ev;
        btn.onclick = function() { filterEvent(ev, this); };
        filterBar.appendChild(btn);
      });
      
      // Restore active state
      const activeBtn = filterBar.querySelector(`[data-event="${activeFilter}"]`) || filterBar.querySelector('[data-event="all"]');
      if (activeBtn) {
        filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        activeBtn.classList.add('active');
      }
    }

    const filtered = activeFilter === 'all' ? allMemories : allMemories.filter(m => m.event === activeFilter);
    
    if (filtered.length === 0) {
      gallery.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🥹</span>
          <p>No memories yet. Check back later!</p>
        </div>
      `;
      return;
    }

    gallery.innerHTML = '';
    const groups = {};
    filtered.forEach(m => { 
      if (!groups[m.event]) groups[m.event] = []; 
      groups[m.event].push(m); 
    });
    
    Object.entries(groups).forEach(([eventName, photos]) => {
      const group = document.createElement('div');
      group.className = 'event-group';
      group.innerHTML = `
        <div class="event-header">
          <span class="event-name">${escapeHtml(eventName)}</span>
          <div class="event-rule"></div>
          <span class="event-count">${photos.length} photo${photos.length !== 1 ? 's' : ''}</span>
          ${isAdmin ? `
          <div class="event-actions">
            <button onclick="editEventName('${escapeHtml(eventName)}')">Rename</button>
            <button onclick="deleteEvent('${escapeHtml(eventName)}')">Delete All</button>
          </div>` : ''}
        </div>
        <div class="photo-grid">
          ${photos.map(p => `
            <div class="photo-card" onclick="openLightbox(${p.id})">
              <img src="${p.src}" alt="${escapeHtml(p.caption)}" loading="lazy" onload="this.classList.add('loaded')"/>
              <div class="photo-info">
                <p class="photo-caption">${escapeHtml(p.caption)}</p>
                <p class="photo-meta">${p.date}</p>
              </div>
              ${isAdmin ? `<button class="photo-delete" onclick="deletePhoto(event, ${p.id})">✕</button>` : ''}
            </div>
          `).join('')}
        </div>
      `;
      gallery.appendChild(group);
    });
  }

  // ============================================
  // ESCAPE HTML (NEW - prevents XSS)
  // ============================================
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ============================================
  // DELETE FUNCTIONS
  // ============================================
  async function deletePhoto(e, id) {
    e.stopPropagation();
    if (!isAdmin) return showToast('Admin only 🔒');
    if (!confirm('Remove this memory?')) return;
    
    const { error } = await sb.from('memories').delete().eq('id', id);
    if (error) { 
      console.error('Delete error:', error); 
      showToast('Failed to delete ❌'); 
      return; 
    }
    showToast('Memory removed.');
    loadMemories();
  }

  async function deleteEvent(eventName) {
    if (!isAdmin) return showToast('Admin only 🔒');
    if (!confirm(`Delete ALL photos from "${eventName}"? This cannot be undone!`)) return;
    
    const { error } = await sb.from('memories').delete().eq('event', eventName);
    if (error) { 
      console.error('Delete error:', error); 
      showToast('Failed to delete ❌'); 
      return; 
    }
    showToast(`"${eventName}" deleted.`);
    activeFilter = 'all';
    loadMemories();
  }

  async function editEventName(oldName) {
    if (!isAdmin) return showToast('Admin only 🔒');
    const newName = prompt('New event name:', oldName);
    if (!newName || newName === oldName) return;
    
    const { error } = await sb.from('memories').update({ event: newName.trim() }).eq('event', oldName);
    if (error) { 
      console.error('Update error:', error); 
      showToast('Failed to rename ❌'); 
      return; 
    }
    showToast(`Renamed to "${newName}"`);
    loadMemories();
  }

  // ============================================
  // LIGHTBOX (FIXED)
  // ============================================
  function openLightbox(id) {
    const memory = allMemories.find(m => m.id === id);
    if (!memory) return;
    document.getElementById('lightboxImg').src = memory.src;
    document.getElementById('lightboxCaption').textContent = memory.caption;
    document.getElementById('lightboxEvent').textContent = memory.event + ' · ' + memory.date;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    // Close if clicking overlay (lightbox div itself) or the close button
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { 
      document.getElementById('lightbox').classList.remove('open'); 
      document.body.style.overflow = ''; 
    }
  });

  // ============================================
  // TOAST
  // ============================================
  let toastTimeout;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; 
    t.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ============================================
  // REALTIME SUBSCRIPTION (FIXED)
  // ============================================
  function setupRealtime() {
    // Clean up existing channel if any
    if (realtimeChannel) {
      sb.removeChannel(realtimeChannel);
    }
    
    realtimeChannel = sb
      .channel('memory-wall-changes')
      .on('postgres_changes', 
        { event: '*', schema: 'public', table: 'memories' }, 
        (payload) => {
          console.log('Realtime update:', payload.eventType);
          loadMemories();
        }
      )
      .subscribe((status) => {
        console.log('Realtime status:', status);
      });
  }

  // ============================================
  // INITIALIZATION
  // ============================================
  setupRealtime();
  loadMemories();
</script>
</body>
</html>
