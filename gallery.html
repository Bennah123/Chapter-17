<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Memory Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080806; --gold: #C9A84C; --gold-bright: #FFD700;
      --gold-border: rgba(201,168,76,0.25); --gold-dim: rgba(201,168,76,0.08);
      --white: #f5f0e8; --muted: rgba(245,240,232,0.45); --card-bg: rgba(15,15,12,0.9);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; background: rgba(8,8,6,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .content { max-width: 1200px; margin: 0 auto; padding: 0 48px 80px; }
    .upload-panel { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 36px; margin-bottom: 60px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
    .panel-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }
    input[type="text"], textarea { background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px; outline: none; transition: all 0.3s ease; width: 100%; }
    input[type="text"]:focus, textarea:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
    input[type="text"]::placeholder, textarea::placeholder { color: var(--muted); font-size: 0.75rem; }
    textarea { resize: vertical; min-height: 80px; }
    .drop-zone { border: 1px dashed var(--gold-border); border-radius: 3px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; margin-bottom: 16px; }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--gold); background: var(--gold-dim); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; padding: 0; border: none; background: none; }
    .drop-icon { font-size: 2rem; display: block; margin-bottom: 10px; }
    .drop-text { font-size: 0.75rem; letter-spacing: 2px; color: var(--muted); }
    .drop-text span { color: var(--gold); }
    .preview-strip { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .preview-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 3px; border: 1px solid var(--gold-border); }
    .btn-upload { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; padding: 14px 40px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 24px rgba(201,168,76,0.2); position: relative; overflow: hidden; display: inline-flex; align-items: center; gap: 10px; }
    .btn-upload::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-upload:hover::before { opacity: 1; }
    .btn-upload:hover { transform: translateY(-1px); }
    .btn-upload span { position: relative; z-index: 1; }
    .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-spinner { width: 14px; height: 14px; border: 2px solid #080806; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    .btn-upload:disabled .btn-spinner { display: inline-block; }
    .btn-upload:disabled span { position: relative; z-index: 1; }
    .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
    .filter-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; }
    .filter-btn { background: transparent; border: 1px solid var(--gold-border); border-radius: 2px; color: var(--muted); font-family: 'Raleway', sans-serif; font-size: 0.7rem; letter-spacing: 2px; padding: 7px 18px; cursor: pointer; transition: all 0.3s ease; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .event-group { margin-bottom: 60px; }
    .event-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .event-name { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; white-space: nowrap; }
    .event-rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }
    .event-count { font-family: 'Cormorant Garamond', serif; font-size: 0.8rem; color: var(--muted); font-style: italic; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .photo-card { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; overflow: hidden; transition: all 0.4s ease; cursor: pointer; position: relative; }
    .photo-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(201,168,76,0.12); }
    .photo-card img { width: 100%; height: 200px; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .photo-card:hover img { transform: scale(1.04); }
    .photo-info { padding: 14px 16px; }
    .photo-caption { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.9rem; color: var(--white); margin-bottom: 6px; line-height: 1.4; }
    .photo-meta { font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); font-family: 'Raleway', sans-serif; }
    .photo-delete { position: absolute; top: 8px; right: 8px; background: rgba(8,8,6,0.8); border: 1px solid var(--gold-border); border-radius: 2px; color: var(--gold); font-size: 0.6rem; padding: 4px 8px; cursor: pointer; opacity: 0; transition: opacity 0.3s ease; letter-spacing: 1px; }
    .photo-card:hover .photo-delete { opacity: 1; }
    .loading { text-align: center; padding: 60px 24px; }
    .loading-spinner { width: 40px; height: 40px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(8,8,6,0.95); z-index: 200; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(10px); }
    .lightbox.open { display: flex; }
    .lightbox-inner { position: relative; max-width: 860px; width: 100%; animation: fadeUp 0.4s ease; }
    .lightbox img { width: 100%; max-height: 70vh; object-fit: contain; border: 1px solid var(--gold-border); border-radius: 4px; }
    .lightbox-caption { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--white); text-align: center; margin-top: 16px; letter-spacing: 1px; }
    .lightbox-event { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 5px; color: var(--gold); text-align: center; margin-top: 6px; }
    .lightbox-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: var(--gold); font-size: 1.4rem; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 2px; transition: opacity 0.3s; }
    .lightbox-close:hover { opacity: 0.6; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 3px; padding: 12px 28px; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { nav { padding: 0 24px; } .hero { padding: 120px 24px 40px; } .content { padding: 0 24px 60px; } .upload-grid { grid-template-columns: 1fr; } .photo-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
  </style>
</head>
<body>

<<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>

<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I · Memory Wall</span>
  <h1 class="page-title">Memory Wall</h1>
  <p class="page-sub">Every moment, preserved forever.</p>
</section>

<div class="content">
  <div class="upload-panel">
    <p class="panel-title">Add a Memory</p>
    <div class="upload-grid">
      <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="uploaderName" placeholder="Who's posting?"/>
      </div>
      <div class="input-group">
        <label>Event / Hangout Name</label>
        <input type="text" id="eventName" placeholder="e.g. Beach Day June"/>
      </div>
    </div>
    <div class="input-group" style="margin-bottom:16px">
      <label>Caption</label>
      <textarea id="photoCaption" placeholder="Say something about this moment..."></textarea>
    </div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" multiple/>
      <span class="drop-icon">📸</span>
      <p class="drop-text">Wahome angusha hizo pics😂 <span>browse</span></p>
    </div>
    <div class="preview-strip" id="previewStrip"></div>
    <button class="btn-upload" id="uploadBtn" onclick="uploadPhotos()">
      <div class="btn-spinner"></div>
      <span>Save to Memory Wall</span>
    </button>
  </div>

  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="filterEvent('all', this)">All</button>
  </div>

  <div id="gallery">
    <div class="loading" id="loadingState">
      <div class="loading-spinner"></div>
      <p>Loading memories...</p>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕ Close</button>
    <img id="lightboxImg" src="" alt=""/>
    <p class="lightbox-caption" id="lightboxCaption"></p>
    <p class="lightbox-event" id="lightboxEvent"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://whgxunnlxhcfthkpcbjd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE'
  );

  let selectedFiles = [];
  let activeFilter = 'all';
  let allMemories = [];

  const fileInput = document.getElementById('fileInput');
  const previewStrip = document.getElementById('previewStrip');
  const dropZone = document.getElementById('dropZone');

  fileInput.addEventListener('change', () => { selectedFiles = Array.from(fileInput.files); renderPreviews(); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    renderPreviews();
  });
  function renderPreviews() {
    previewStrip.innerHTML = '';
    selectedFiles.forEach(file => {
      const img = document.createElement('img');
      img.className = 'preview-thumb';
      const reader = new FileReader();
      reader.onload = e => img.src = e.target.result;
      reader.onerror = () => console.error('Failed to read file:', file.name);
      reader.readAsDataURL(file);
      previewStrip.appendChild(img);
    });
  }
  async function uploadPhotos() {
    const name    = document.getElementById('uploaderName').value.trim();
    const event   = document.getElementById('eventName').value.trim();
    const caption = document.getElementById('photoCaption').value.trim();
    if (!name)    return alert('Please enter your name!');
    if (!event)   return alert('Please enter an event name!');
    if (selectedFiles.length === 0) return alert('Please select at least one photo!');

    const btn = document.getElementById('uploadBtn');
    const btnSpan = btn.querySelector('span');
    btn.disabled = true;
    btnSpan.textContent = 'Saving...';

    const date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    let successCount = 0;
    let failCount = 0;

    for (const file of selectedFiles) {
      try {
        const src = await toBase64(file);
        const { error } = await sb.from('memories').insert({ 
          src, 
          caption: caption || 'A Chapter 17 moment.', 
          event, 
          uploader: name, 
          date 
        });
        if (error) {
          console.error('Insert error:', error);
          failCount++;
        } else {
          successCount++;
        }
      } catch (err) {
        console.error('File read error:', err);
        failCount++;
      }
    }

    btn.disabled = false;
    btnSpan.textContent = 'Save to Memory Wall';

    if (successCount > 0) {
      showToast(`${successCount} memory${successCount !== 1 ? 'ies' : 'y'} saved!! 🔥`);
      document.getElementById('uploaderName').value = '';
      document.getElementById('eventName').value = '';
      document.getElementById('photoCaption').value = '';
      selectedFiles = []; previewStrip.innerHTML = ''; fileInput.value = '';
      loadMemories();
    } else {
      showToast('Failed to save. Check console for errors ❌');
    }
  }

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = () => rej(new Error('Read failed'));
      r.readAsDataURL(file);
    });
  }

  async function loadMemories() {
    const { data, error } = await sb.from('memories').select('*').order('created_at', { ascending: false });
    if (error) { console.error('Load error:', error); return; }
    allMemories = data || [];
    renderGallery();
  }

  function filterEvent(event, btn) {
    activeFilter = event;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery();
  }

  function renderGallery() {
    const gallery   = document.getElementById('gallery');
    const filterBar = document.getElementById('filterBar');
    const events = [...new Set(allMemories.map(m => m.event))];
    filterBar.querySelectorAll('.filter-btn[data-event]').forEach(b => b.remove());
    events.forEach(ev => {
      if (!filterBar.querySelector(`[data-event="${ev}"]`)) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn'; btn.dataset.event = ev; btn.textContent = ev;
        btn.onclick = function() { filterEvent(ev, this); };
        filterBar.appendChild(btn);
      }
    });
    const filtered = activeFilter === 'all' ? allMemories : allMemories.filter(m => m.event === activeFilter);
    if (filtered.length === 0) {
      gallery.innerHTML = `<div class="empty-state"><span class="empty-icon">🥹</span><p>No memories yet. Be the first to add one.</p></div>`;
      return;
    }
    gallery.innerHTML = '';
    const groups = {};
    filtered.forEach(m => { if (!groups[m.event]) groups[m.event] = []; groups[m.event].push(m); });
    Object.entries(groups).forEach(([eventName, photos]) => {
      const group = document.createElement('div');
      group.className = 'event-group';
      group.innerHTML = `
        <div class="event-header">
          <span class="event-name">${eventName}</span>
          <div class="event-rule"></div>
          <span class="event-count">${photos.length} photo${photos.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="photo-grid">
          ${photos.map(p => `
            <div class="photo-card" onclick="openLightbox(${p.id})">
              <img src="${p.src}" alt="${p.caption}" loading="lazy"/>
              <div class="photo-info">
                <p class="photo-caption">${p.caption}</p>
                <p class="photo-meta">${p.uploader} · ${p.date}</p>
              </div>
              <button class="photo-delete" onclick="deletePhoto(event, ${p.id})">✕</button>
            </div>
          `).join('')}
        </div>
      `;
      gallery.appendChild(group);
    });
  }

  async function deletePhoto(e, id) {
    e.stopPropagation();
    if (!confirm('Remove this memory?')) return;
    const { error } = await sb.from('memories').delete().eq('id', id);
    if (error) { console.error('Delete error:', error); showToast('Failed to delete ❌'); return; }
    showToast('Memory removed.');
    loadMemories();
  }
  function openLightbox(id) {
    const memory = allMemories.find(m => m.id === id);
    if (!memory) return;
    document.getElementById('lightboxImg').src = memory.src;
    document.getElementById('lightboxCaption').textContent = memory.caption;
    document.getElementById('lightboxEvent').textContent = memory.event + ' · ' + memory.date;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
  });
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  sb.channel('memories').on('postgres_changes', { event: '*', schema: 'public', table: 'memories' }, () => loadMemories()).subscribe();
  loadMemories();
</script>
</body>
</html>
