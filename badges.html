<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Badges</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080806; --gold: #C9A84C; --gold-bright: #FFD700; --gold-border: rgba(201,168,76,0.25); --gold-dim: rgba(201,168,76,0.08); --white: #f5f0e8; --muted: rgba(245,240,232,0.45); --card-bg: rgba(15,15,12,0.9); }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; background: rgba(8,8,6,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .admin-toggle { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 3px; color: var(--muted); background: none; border: 1px solid var(--gold-border); border-radius: 3px; padding: 8px 16px; cursor: pointer; transition: all 0.3s; }
    .admin-toggle:hover { border-color: var(--gold); color: var(--gold); }
    .admin-toggle.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .content { max-width: 1100px; margin: 0 auto; padding: 0 48px 100px; }
    .add-panel { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 36px; margin-bottom: 60px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
    .panel-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }
    select { background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border); border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif; font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px; outline: none; transition: all 0.3s ease; width: 100%; }
    select:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
    select option { background: #0f0f0c; }
    .btn-award { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; padding: 14px 40px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 24px rgba(201,168,76,0.2); position: relative; overflow: hidden; }
    .btn-award::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-award:hover::before { opacity: 1; }
    .btn-award:hover { transform: translateY(-1px); }
    .btn-award span { position: relative; z-index: 1; }
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 36px; }
    .section-header h3 { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); white-space: nowrap; }
    .section-header .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }
    .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
    .member-badge-card { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 28px 24px; transition: all 0.4s ease; opacity: 0; transform: translateY(20px); }
    .member-badge-card.visible { opacity: 1; transform: translateY(0); }
    .member-badge-card:hover { border-color: var(--gold); box-shadow: 0 12px 40px rgba(201,168,76,0.12); }
    .card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--gold-border); }
    .member-initial { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-bright)); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 1.1rem; color: #080806; font-weight: 700; flex-shrink: 0; }
    .member-info-name { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.15rem; color: var(--white); display: block; }
    .member-badge-count { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 3px; color: var(--gold); }
    .badges-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge-pill { display: flex; align-items: center; gap: 6px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 2px; padding: 5px 12px; font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 2px; color: var(--gold); }
    .badge-pill .badge-emoji { font-size: 0.9rem; }
    .badge-pill button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.6rem; transition: color 0.2s; padding: 0; line-height: 1; }
    .badge-pill button:hover { color: #c94c4c; }
    .no-badges { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--muted); }
    .badge-catalogue { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 60px; }
    .catalogue-item { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; padding: 20px; text-align: center; transition: all 0.3s; }
    .catalogue-item:hover { border-color: var(--gold); transform: translateY(-2px); }
    .cat-emoji { font-size: 2rem; display: block; margin-bottom: 10px; }
    .cat-name { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 3px; color: var(--gold); display: block; margin-bottom: 6px; }
    .cat-desc { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem; color: var(--muted); }
    .cat-holders { font-family: 'Raleway', sans-serif; font-size: 0.6rem; color: var(--muted); margin-top: 8px; letter-spacing: 1px; }
    .loading { text-align: center; padding: 60px 24px; }
    .loading-spinner { width: 40px; height: 40px; border: 2px solid var(--gold-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 3px; padding: 12px 28px; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(8,8,6,0.85); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 4px; max-width: 360px; width: 100%; padding: 32px; text-align: center; }
    .modal-title { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 16px; text-transform: uppercase; }
    .modal p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
    .modal .input-group { margin-bottom: 20px; }
    .modal input { text-align: center; font-size: 1rem; letter-spacing: 4px; }
    .btn-cancel { background: none; border: 1px solid var(--gold-border); border-radius: 3px; color: var(--muted); font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; padding: 10px 24px; cursor: pointer; transition: all 0.3s; }
    .btn-cancel:hover { border-color: var(--gold); color: var(--gold); }
    .btn-save { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 3px; color: #080806; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px; padding: 10px 24px; cursor: pointer; transition: all 0.3s; }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 0 16px rgba(201,168,76,0.3); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { nav { padding: 0 24px; } .hero { padding: 120px 24px 40px; } .content { padding: 0 24px 80px; } .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <div style="display:flex;gap:16px;align-items:center;">
    <button class="admin-toggle" id="adminBtn" onclick="toggleAdmin()">🔒 Admin</button>
    <a class="nav-back" href="dashboard.html">← Dashboard</a>
  </div>
</nav>
<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I · Squad Feed</span>
  <h1 class="page-title">🏅 Badges</h1>
  <p class="page-sub">"Earn your title. Own your reputation."</p>
</section>
<div class="content">
  <div class="add-panel">
    <p class="panel-title">Award a Badge</p>
    <div class="form-grid">
      <div class="input-group">
        <label>Member</label>
        <select id="badgeMember"><option value="">Select member...</option></select>
      </div>
      <div class="input-group">
        <label>Badge</label>
        <select id="badgeSelect">
          <option value="👑 OG Member">👑 OG Member</option>
          <option value="♟️ Chess Champion">♟️ Chess Champion</option>
          <option value="🧠 Trivia King">🧠 Trivia King</option>
          <option value="🔢 Math Duel King">🔢 Math Duel King</option>
          <option value="💛 Most Loyal">💛 Most Loyal</option>
          <option value="😂 Always Late">😂 Always Late</option>
          <option value="🔥 Hype Man">🔥 Hype Man</option>
          <option value="📸 Photographer">📸 Photographer</option>
          <option value="📅 Event Planner">📅 Event Planner</option>
          <option value="✨ Most Vibes">✨ Most Vibes</option>
          <option value="🎭 Roast Master">🎭 Roast Master</option>
          <option value="💑 Couple Goals">💑 Couple Goals</option>
          <option value="🕺 Life of the Party">🕺 Life of the Party</option>
          <option value="🤫 Secret Keeper">🤫 Secret Keeper</option>
          <option value="💬 Most Talkative">💬 Most Talkative</option>
        </select>
      </div>
    </div>
    <button class="btn-award" onclick="awardBadge()"><span>Award Badge 🏅</span></button>
  </div>

  <div class="section-header"><h3>Member Badges</h3><div class="rule"></div></div>
  <div class="members-grid" id="membersGrid">
    <div class="loading"><div class="loading-spinner"></div><p>Loading members...</p></div>
  </div>

  <div class="section-header"><h3>Badge Catalogue</h3><div class="rule"></div></div>
  <div class="badge-catalogue" id="badgeCatalogue"></div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <p class="modal-title">🔐 Admin Access</p>
    <p>Enter the admin password to unlock badge removal.</p>
    <div class="input-group">
      <input type="password" id="adminPassword" placeholder="••••••" onkeydown="if(event.key==='Enter')verifyAdmin()"/>
    </div>
    <button class="btn-save" onclick="verifyAdmin()">Unlock</button>
    <button class="btn-cancel" onclick="closeAdminModal()" style="margin-top:8px;">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
  const ADMIN_PASSWORD = '@Sylvia261005.';

  const { createClient } = supabase;
  const sb = createClient(
    'https://whgxunnlxhcfthkpcbjd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ3h1bm5seGhjZnRoa3BjYmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njg4NzUsImV4cCI6MjA5NjM0NDg3NX0.FLqHavCjkXesCimVw7WvRA7a4zV7_cUPTi1jNWrq6mE'
  );

  const BADGE_CATALOGUE = [
    { emoji:'♟️', name:'Chess Champion', desc:'Undefeated on the board' },
    { emoji:'🧠', name:'Trivia King', desc:'Knows everything about everything' },
    { emoji:'🔢', name:'Math Duel King', desc:'No calculator needed' },
    { emoji:'💛', name:'Most Loyal', desc:'Always shows up for the squad' },
    { emoji:'😂', name:'Always Late', desc:'IST — Is Still Tardy 😂' },
    { emoji:'🔥', name:'Hype Man', desc:'Energy of the whole group' },
    { emoji:'📸', name:'Photographer', desc:'Documents every moment' },
    { emoji:'📅', name:'Event Planner', desc:'The one who makes it happen' },
    { emoji:'✨', name:'Most Vibes', desc:'Just radiates good energy' },
    { emoji:'💑', name:'Couple Goals', desc:'Relationship goals fr' },
    { emoji:'🕺', name:'Life of the Party', desc:'Never a dull moment' },
    { emoji:'📱', name:'Screen Addict', desc:'Most likely to be on their phone' },
    { emoji:'☕', name:'Coffee Addict', desc:'Cannot function without caffeine' },
    { emoji:'🏆', name:'Competitive Spirit', desc:'Always up for a challenge' },
    { emoji:'🎨', name:'Artistic Soul', desc:'Brings creativity to everything' },
    { emoji:'🎤', name:'Shower Singer', desc:'Best vocals in the shower' },
    { emoji:'🍕', name:'Foodie', desc:'Always down for food adventures' },
    { emoji:'🌙', name:'Night Owl', desc:'Most active during late hours' },
    { emoji:'🌅', name:'Early Bird', desc:'Always up with the sunrise' },
    { emoji:'🎤', name:'Karaoke King/Queen', desc:'Owns the karaoke mic' },
    { emoji:'😌', name:'Introvert', desc:'Enjoys the chill vibes' },
    { emoji:'👥', name:'Extrovert', desc:'Energized by socializing' },
    
  ];

  let allMembers = [];
  let isAdmin = false;

  function toggleAdmin() {
    if (isAdmin) {
      isAdmin = false;
      document.getElementById('adminBtn').classList.remove('active');
      document.getElementById('adminBtn').textContent = '🔒 Admin';
      renderMemberBadges();
      showToast('Admin mode off');
    } else {
      document.getElementById('adminModal').classList.add('show');
      document.getElementById('adminPassword').focus();
    }
  }

  function verifyAdmin() {
    const input = document.getElementById('adminPassword').value;
    if (input === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('adminBtn').classList.add('active');
      document.getElementById('adminBtn').textContent = '🔓 Admin';
      document.getElementById('adminPassword').value = '';
      closeAdminModal();
      renderMemberBadges();
      showToast('Admin mode unlocked 🔓');
    } else {
      showToast('Wrong password ❌');
      document.getElementById('adminPassword').value = '';
    }
  }

  function closeAdminModal() {
    document.getElementById('adminModal').classList.remove('show');
  }

  async function loadMembers() {
    const { data, error } = await sb.from('members').select('*').order('name');
    if (error) { console.error('LOAD ERROR:', error); showToast('Error loading: ' + error.message); return; }
    allMembers = data || [];
    populateMemberSelect();
    renderMemberBadges();
    renderCatalogue();
  }

  function populateMemberSelect() {
    const sel = document.getElementById('badgeMember');
    sel.innerHTML = '<option value="">Select member...</option>';
    allMembers.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      sel.appendChild(opt);
    });
  }

  async function awardBadge() {
    const memberId = document.getElementById('badgeMember').value;
    const badge = document.getElementById('badgeSelect').value;
    if (!memberId) return alert('Select a member!');
    
    const member = allMembers.find(m => m.id == memberId);
    if (!member) return;
    
    const existing = member.badges || [];
    const badgeName = badge.split(' ').slice(1).join(' ');
    if (existing.some(b => b.includes(badgeName))) return alert(`${member.name} already has this badge!`);
    
    const updated = [...existing, badge];
    const { error } = await sb.from('members').update({ badges: updated }).eq('id', memberId);
    
    if (error) {
      console.error('AWARD ERROR:', error);
      showToast('Error: ' + error.message);
      return;
    }
    
    showToast(`🏅 ${badge} awarded to ${member.name}!!`);
    loadMembers();
  }

  async function removeBadge(memberId, badge) {
    if (!isAdmin) return showToast('Admin only 🔒');
    const member = allMembers.find(m => m.id === memberId);
    if (!member) return;
    const updated = (member.badges || []).filter(b => b !== badge);
    const { error } = await sb.from('members').update({ badges: updated }).eq('id', memberId);
    if (error) {
      console.error('REMOVE ERROR:', error);
      showToast('Error: ' + error.message);
      return;
    }
    showToast('Badge removed.');
    loadMembers();
  }

  function renderMemberBadges() {
    const grid = document.getElementById('membersGrid');
    if (allMembers.length === 0) {
      grid.innerHTML = '<div class="empty-state"><span class="empty-icon">🏅</span><p>No members yet. Add them in the Members page!</p></div>';
      return;
    }
    grid.innerHTML = '';
    allMembers.forEach((m, i) => {
      const badges = m.badges || [];
      const card = document.createElement('div');
      card.className = 'member-badge-card';
      card.style.transitionDelay = `${i * 0.07}s`;
      
      const badgesHTML = badges.length
        ? badges.map(b => {
            const removeBtn = isAdmin ? `<button onclick="removeBadge(${m.id}, '${b}')">✕</button>` : '';
            return `<div class="badge-pill"><span class="badge-emoji">${b.split(' ')[0]}</span>${b.split(' ').slice(1).join(' ')}${removeBtn}</div>`;
          }).join('')
        : '<span class="no-badges">No badges yet 🥲</span>';
      
      card.innerHTML = `
        <div class="card-top">
          <div class="member-initial">${m.name.charAt(0).toUpperCase()}</div>
          <div>
            <span class="member-info-name">${m.name}</span>
            <span class="member-badge-count">${badges.length} badge${badges.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div class="badges-wrap">${badgesHTML}</div>
      `;
      grid.appendChild(card);
    });
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.member-badge-card').forEach(c => observer.observe(c));
  }

  function renderCatalogue() {
    const cat = document.getElementById('badgeCatalogue');
    cat.innerHTML = '';
    BADGE_CATALOGUE.forEach(b => {
      const holders = allMembers.filter(m => (m.badges || []).some(mb => mb.includes(b.name)));
      const item = document.createElement('div');
      item.className = 'catalogue-item';
      item.innerHTML = `
        <span class="cat-emoji">${b.emoji}</span>
        <span class="cat-name">${b.name}</span>
        <span class="cat-desc">${b.desc}</span>
        <span class="cat-holders">${holders.length > 0 ? holders.map(h => h.name).join(', ') : 'No holders yet'}</span>
      `;
      cat.appendChild(item);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  sb.channel('badges').on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, () => loadMembers()).subscribe();
  loadMembers();
</script>
</body>
</html>
