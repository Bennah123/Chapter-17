<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 17 — Birthdays</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080806;
      --gold: #C9A84C;
      --gold-bright: #FFD700;
      --gold-border: rgba(201,168,76,0.25);
      --gold-dim: rgba(201,168,76,0.08);
      --white: #f5f0e8;
      --muted: rgba(245,240,232,0.45);
      --card-bg: rgba(15,15,12,0.9);
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'Raleway', sans-serif; min-height: 100vh; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 100;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      background: rgba(8,8,6,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--gold-border);
    }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; }
    .nav-back { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }

    /* ── HERO ── */
    .hero { padding: 140px 48px 60px; text-align: center; position: relative; }
    .hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 8px; color: var(--gold); display: block; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2.5rem, 8vw, 5.5rem); background: linear-gradient(160deg, #fff8e7 0%, var(--gold-bright) 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(201,168,76,0.25)); opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
    .page-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-top: 12px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }

    /* ── CONTENT ── */
    .content { max-width: 1100px; margin: 0 auto; padding: 0 48px 100px; }

    /* ── NEXT BIRTHDAY HERO CARD ── */
    .next-bday {
      background: var(--card-bg); border: 1px solid var(--gold);
      border-radius: 4px; padding: 40px; margin-bottom: 50px;
      text-align: center; position: relative; overflow: hidden;
      opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards;
    }

    .next-bday::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .next-label { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 6px; color: var(--gold); margin-bottom: 14px; display: block; }
    .next-name { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(2rem, 6vw, 3.5rem); background: linear-gradient(160deg, #fff8e7, var(--gold-bright), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
    .next-date { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--muted); margin-bottom: 20px; }

    /* Countdown boxes */
    .countdown-boxes { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .cbox { background: rgba(201,168,76,0.1); border: 1px solid var(--gold-border); border-radius: 3px; padding: 16px 20px; min-width: 70px; text-align: center; }
    .cbox-num { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 2rem; color: var(--gold-bright); display: block; filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); }
    .cbox-lbl { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 3px; color: var(--muted); }

    .today-banner {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 1.4rem; color: var(--gold-bright);
      filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }

    /* ── ADD PANEL ── */
    .add-panel {
      background: var(--card-bg); border: 1px solid var(--gold-border);
      border-radius: 4px; padding: 36px; margin-bottom: 60px;
      opacity: 0; animation: fadeUp 0.8s ease 0.9s forwards;
    }
    .panel-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-family: 'Cinzel', serif; }

    input[type="text"], input[type="date"], textarea {
      background: rgba(201,168,76,0.05); border: 1px solid var(--gold-border);
      border-radius: 3px; color: var(--white); font-family: 'Raleway', sans-serif;
      font-size: 0.82rem; letter-spacing: 1px; padding: 12px 16px;
      outline: none; transition: all 0.3s ease; width: 100%;
    }
    input:focus, textarea:focus { border-color: var(--gold); background: rgba(201,168,76,0.08); box-shadow: 0 0 16px rgba(201,168,76,0.1); }
    input::placeholder, textarea::placeholder { color: var(--muted); font-size: 0.75rem; }
    textarea { resize: vertical; min-height: 70px; }

    .btn-add {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      border: none; border-radius: 3px; color: #080806;
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 5px; padding: 14px 40px; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 0 24px rgba(201,168,76,0.2);
      position: relative; overflow: hidden;
    }
    .btn-add::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #fff8e7, var(--gold-bright)); opacity: 0; transition: opacity 0.3s; }
    .btn-add:hover::before { opacity: 1; }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(255,215,0,0.3); }
    .btn-add span { position: relative; z-index: 1; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .section-header h3 { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); white-space: nowrap; }
    .section-header .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }

    /* ── BIRTHDAY GRID ── */
    .bday-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

    /* ── BIRTHDAY CARD ── */
    .bday-card {
      background: var(--card-bg); border: 1px solid var(--gold-border);
      border-radius: 4px; padding: 28px 24px; position: relative;
      transition: all 0.4s ease; text-align: center;
      opacity: 0; transform: translateY(20px);
    }
    .bday-card.visible { opacity: 1; transform: translateY(0); }
    .bday-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(201,168,76,0.12); }
    .bday-card.is-today { border-color: var(--gold); box-shadow: 0 0 30px rgba(255,215,0,0.2); animation: todayGlow 2s ease-in-out infinite; }
    .bday-card.is-soon { border-color: rgba(201,168,76,0.5); }

    @keyframes todayGlow { 0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.2); } 50% { box-shadow: 0 0 40px rgba(255,215,0,0.4); } }

    /* Status badge */
    .bday-status {
      position: absolute; top: 12px; right: 12px;
      font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 2px;
      padding: 3px 10px; border-radius: 2px;
    }
    .status-today { background: var(--gold); color: var(--bg); }
    .status-soon  { background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold); }
    .status-days  { background: transparent; border: 1px solid var(--gold-border); color: var(--muted); }

    .bday-emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }
    .bday-name { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.3rem; color: var(--white); margin-bottom: 4px; }
    .bday-date { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px; }
    .bday-age { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
    .bday-note { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

    /* Days away bar */
    .days-away { margin-top: 14px; }
    .days-num { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; color: var(--gold-bright); display: block; filter: drop-shadow(0 0 8px rgba(255,215,0,0.3)); }
    .days-lbl { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 3px; color: var(--muted); }

    .bday-delete { position: absolute; bottom: 12px; right: 12px; background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; opacity: 0; transition: all 0.3s; letter-spacing: 1px; font-family: 'Raleway', sans-serif; }
    .bday-card:hover .bday-delete { opacity: 1; color: var(--gold); }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 20px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); letter-spacing: 2px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* confetti canvas */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .hero { padding: 120px 24px 40px; }
      .content { padding: 0 24px 80px; }
      .form-grid { grid-template-columns: 1fr; }
      .countdown-boxes { gap: 10px; }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<nav>
  <a class="nav-logo" href="index.html">Chapter 17</a>
  <a class="nav-back" href="dashboard.html">← Dashboard</a>
</nav>

<section class="hero">
  <div class="hero-glow"></div>
  <span class="page-tag">X V I I &nbsp;·&nbsp; Birthdays</span>
  <h1 class="page-title">Birthdays</h1>
  <p class="page-sub">"Never miss a moment that matters."</p>
</section>

<div class="content">

  <!-- NEXT BIRTHDAY HERO -->
  <div class="next-bday" id="nextBday">
    <span class="next-label">Next Birthday</span>
    <p class="next-name" id="nextName">—</p>
    <p class="next-date" id="nextDate">Add birthdays below</p>
    <div id="nextCountdown"></div>
  </div>

  <!-- ADD BIRTHDAY -->
  <div class="add-panel">
    <p class="panel-title">Add a Birthday</p>
    <div class="form-grid">
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="bdayName" placeholder="Member's name"/>
      </div>
      <div class="input-group">
        <label>Birthday</label>
        <input type="date" id="bdayDate"/>
      </div>
      <div class="input-group">
        <label>Birth Year (optional)</label>
        <input type="text" id="bdayYear" placeholder="e.g. 2001"/>
      </div>
    </div>
    <div class="input-group" style="margin-bottom:20px">
      <label>A Note for Them</label>
      <textarea id="bdayNote" placeholder="Say something sweet... or funny 😂"></textarea>
    </div>
    <button class="btn-add" onclick="addBirthday()"><span>Add Birthday</span></button>
  </div>

  <!-- BIRTHDAY LIST -->
  <div class="section-header">
    <h3>The Squad's Birthdays</h3>
    <div class="rule"></div>
  </div>

  <div class="bday-grid" id="bdayGrid">
    <div class="empty-state" id="emptyState">
      <span class="empty-icon">🎂</span>
      <p>No birthdays yet. Add the squad!</p>
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = 'c17_birthdays';

  function loadBirthdays() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveBirthdays(b) { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); }

  function getDaysUntil(monthDay) {
    const today = new Date(); today.setHours(0,0,0,0);
    const [m, d] = monthDay.split('-').map(Number);
    let next = new Date(today.getFullYear(), m - 1, d);
    if (next < today) next.setFullYear(today.getFullYear() + 1);
    return Math.round((next - today) / 86400000);
  }

  function getMonthDay(dateStr) {
    const parts = dateStr.split('-');
    return `${parts[1]}-${parts[2]}`;
  }

  function formatBirthday(dateStr) {
    const [, m, d] = dateStr.split('-');
    const date = new Date(2000, parseInt(m) - 1, parseInt(d));
    return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
  }

  function getAge(dateStr, yearOfBirth) {
    if (!yearOfBirth) return null;
    const today = new Date();
    const [, m, d] = dateStr.split('-');
    let age = today.getFullYear() - parseInt(yearOfBirth);
    const bday = new Date(today.getFullYear(), parseInt(m) - 1, parseInt(d));
    if (bday > today) age--;
    return age;
  }

  function addBirthday() {
    const name = document.getElementById('bdayName').value.trim();
    const date = document.getElementById('bdayDate').value;
    const year = document.getElementById('bdayYear').value.trim();
    const note = document.getElementById('bdayNote').value.trim();

    if (!name) return alert('Enter a name!');
    if (!date) return alert('Enter a birthday!');

    const birthdays = loadBirthdays();
    birthdays.push({ id: Date.now(), name, date, year, note });
    saveBirthdays(birthdays);
    renderBirthdays();

    document.getElementById('bdayName').value = '';
    document.getElementById('bdayDate').value = '';
    document.getElementById('bdayYear').value = '';
    document.getElementById('bdayNote').value = '';
  }

  function deleteBirthday(id) {
    if (!confirm('Remove this birthday?')) return;
    saveBirthdays(loadBirthdays().filter(b => b.id !== id));
    renderBirthdays();
  }

  function renderNextBirthday(birthdays) {
    if (birthdays.length === 0) return;

    const sorted = [...birthdays].sort((a, b) => getDaysUntil(getMonthDay(a.date)) - getDaysUntil(getMonthDay(b.date)));
    const next = sorted[0];
    const days = getDaysUntil(getMonthDay(next.date));

    document.getElementById('nextName').textContent = next.name;
    document.getElementById('nextDate').textContent = formatBirthday(next.date);

    const countdownEl = document.getElementById('nextCountdown');

    if (days === 0) {
      countdownEl.innerHTML = `<p class="today-banner">🎉 Happy Birthday ${next.name}!! 🎉</p>`;
      launchConfetti();
    } else {
      const d = days;
      const h = new Date().getHours();
      const m = new Date().getMinutes();
      countdownEl.innerHTML = `
        <div class="countdown-boxes">
          <div class="cbox"><span class="cbox-num">${d}</span><span class="cbox-lbl">Days</span></div>
          <div class="cbox"><span class="cbox-num">${24 - h}</span><span class="cbox-lbl">Hours</span></div>
          <div class="cbox"><span class="cbox-num">${60 - m}</span><span class="cbox-lbl">Minutes</span></div>
        </div>
      `;
    }
  }

  function renderBirthdays() {
    const birthdays = loadBirthdays();
    const grid  = document.getElementById('bdayGrid');
    const empty = document.getElementById('emptyState');

    renderNextBirthday(birthdays);

    if (birthdays.length === 0) {
      grid.innerHTML = '';
      grid.appendChild(empty);
      return;
    }

    // Sort by days until birthday
    const sorted = [...birthdays].sort((a, b) =>
      getDaysUntil(getMonthDay(a.date)) - getDaysUntil(getMonthDay(b.date))
    );

    grid.innerHTML = '';

    sorted.forEach((b, i) => {
      const days     = getDaysUntil(getMonthDay(b.date));
      const isToday  = days === 0;
      const isSoon   = days <= 7 && days > 0;
      const age      = getAge(b.date, b.year);

      let statusHTML = '';
      if (isToday) statusHTML = `<span class="bday-status status-today">Today! 🎂</span>`;
      else if (isSoon) statusHTML = `<span class="bday-status status-soon">In ${days}d</span>`;
      else statusHTML = `<span class="bday-status status-days">${days}d away</span>`;

      let emoji = '🎂';
      if (isToday) emoji = '🎉';
      else if (isSoon) emoji = '⏳';

      const card = document.createElement('div');
      card.className = `bday-card${isToday ? ' is-today' : isSoon ? ' is-soon' : ''}`;
      card.style.transitionDelay = `${i * 0.07}s`;
      card.innerHTML = `
        ${statusHTML}
        <span class="bday-emoji">${emoji}</span>
        <p class="bday-name">${b.name}</p>
        <p class="bday-date">${formatBirthday(b.date)}</p>
        ${age ? `<p class="bday-age">Turning ${age + (isToday ? 0 : 1)} this year</p>` : ''}
        ${b.note ? `<p class="bday-note">"${b.note}"</p>` : ''}
        <div class="days-away">
          <span class="days-num">${isToday ? '🎊' : days}</span>
          <span class="days-lbl">${isToday ? 'Happy Birthday!!' : 'days away'}</span>
        </div>
        <button class="bday-delete" onclick="deleteBirthday(${b.id})">✕ remove</button>
      `;
      grid.appendChild(card);
    });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.bday-card').forEach(c => observer.observe(c));
  }

  /* ── Gold Confetti ── */
  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const pieces = Array.from({ length: 120 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 10 + 4,
      h: Math.random() * 6 + 3,
      color: ['#FFD700','#C9A84C','#FFF0A0','#ffffff'][Math.floor(Math.random()*4)],
      speed: Math.random() * 3 + 1,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 4
    }));

    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.y += p.speed;
        p.angle += p.spin;
        if (p.y > canvas.height) p.y = -20;
      });
      frame++;
      if (frame < 300) requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }

  renderBirthdays();
</script>

</body>
</html>
